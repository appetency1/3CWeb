<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAISON Nav — Redesign</title>
  <style>
    :root {
      --bg: #f9f5f0;
      --surface: #fffcfa;
      --text: #1f1c1b;
      --text-muted: #7a726d;
      --border: #ede8e3;
      --input-bg: #f5f1ed;
      --brand: #c45c48;
      --brand-600: #a64a38;
      --brand-200: #f0d4ce;
      --avatar: #2dd4bf;

      --ease-out-quart: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .site-header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 2rem;
      padding: 1.1rem 2.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: 1.35rem;
      letter-spacing: 0.08em;
      justify-self: start;
    }

    .logo-mark {
      display: grid;
      place-items: center;
      width: 2.1rem;
      height: 2.1rem;
      background: var(--brand);
      color: var(--surface);
      border-radius: 0.45rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0;
    }

    .nav-wrap {
      position: relative;
      justify-self: center;
    }

    .nav-wrap nav ul {
      display: flex;
      gap: 0.25rem;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .nav-wrap nav ul li a {
      display: inline-block;
      padding: 0.5rem 1.1rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      white-space: nowrap;
      outline: none;
      transition: color 0.25s var(--ease-out-quart);
    }

    .nav-wrap nav ul li a:hover,
    .nav-wrap nav ul li a:focus-visible {
      color: var(--brand);
    }

    .nav-wrap nav ul li.active a {
      color: var(--text);
    }

    .nav-indicator {
      position: absolute;
      bottom: -2px;
      height: 2px;
      background: var(--brand);
      border-radius: 100vw;
      pointer-events: none;
      transition:
        left 0.45s var(--ease-out-expo),
        width 0.45s var(--ease-out-expo),
        opacity 0.25s var(--ease-out-quart);
      opacity: 0;
    }

    .nav-indicator.is-visible {
      opacity: 1;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      justify-self: end;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--input-bg);
      border: 1px solid transparent;
      border-radius: 100vw;
      padding: 0.25rem;
      min-width: 220px;
      transition: border-color 0.2s var(--ease-out-quart);
    }

    .search-box:focus-within {
      border-color: var(--brand-200);
    }

    .search-box input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 0.35rem 0.7rem;
      outline: none;
      font-size: 0.82rem;
      color: var(--text);
      min-width: 0;
    }

    .search-box input::placeholder {
      color: #a39a94;
    }

    .search-btn,
    .icon-btn {
      display: grid;
      place-items: center;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      background: transparent;
      color: var(--text);
      transition: color 0.2s var(--ease-out-quart), background 0.2s var(--ease-out-quart);
    }

    .search-btn {
      width: 1.85rem;
      height: 1.85rem;
      border-radius: 50%;
      background: var(--brand);
      color: var(--surface);
    }

    .search-btn:hover {
      background: var(--brand-600);
    }

    .icon-btn {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 50%;
    }

    .icon-btn:hover,
    .icon-btn:focus-visible {
      color: var(--brand);
      background: var(--input-bg);
    }

    .avatar {
      display: grid;
      place-items: center;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      background: var(--avatar);
      color: white;
      font-size: 0.7rem;
      font-weight: 600;
    }

    @media (max-width: 960px) {
      .site-header {
        padding: 1rem 1.25rem;
      }

      .search-box {
        display: none;
      }
    }

    @media (max-width: 680px) {
      .site-header {
        grid-template-columns: auto 1fr auto;
        gap: 1rem;
      }

      .logo-text {
        display: none;
      }

      .nav-wrap nav ul li a {
        padding: 0.5rem 0.65rem;
        font-size: 0.82rem;
      }

      .icon-btn:not(.user) {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="logo" href="#">
      <span class="logo-mark">M</span>
      <span class="logo-text">MAISON</span>
    </a>

    <div class="nav-wrap">
      <nav>
        <ul>
          <li class="active"><a href="#home">首页</a></li>
          <li><a href="#women">女装</a></li>
          <li><a href="#men">男装</a></li>
          <li><a href="#shoes">鞋靴</a></li>
          <li><a href="#accessories">配饰</a></li>
          <li><a href="#service">客服</a></li>
        </ul>
      </nav>
      <span class="nav-indicator" aria-hidden="true"></span>
    </div>

    <div class="header-actions">
      <div class="search-box">
        <input type="text" placeholder="搜索商品、品牌...">
        <button class="search-btn" aria-label="搜索">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </button>
      </div>
      <button class="icon-btn" aria-label="消息">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
          <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
      </button>
      <button class="icon-btn" aria-label="订单">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
      </button>
      <button class="icon-btn user" aria-label="用户">
        <span class="avatar">rafa</span>
      </button>
    </div>
  </header>

  <script>
    (function () {
      const navWrap = document.querySelector('.nav-wrap');
      const indicator = navWrap.querySelector('.nav-indicator');
      const links = Array.from(navWrap.querySelectorAll('nav ul a'));

      const setIndicator = (anchor, animate = true) => {
        const wrapRect = navWrap.getBoundingClientRect();
        const rect = anchor.getBoundingClientRect();

        indicator.style.left = `${rect.x - wrapRect.x}px`;
        indicator.style.width = `${rect.width}px`;
        indicator.classList.add('is-visible');
      };

      const setActive = (index) => {
        links.forEach((link, i) => {
          link.parentElement.classList.toggle('active', i === index);
        });
        setIndicator(links[index]);
      };

      links.forEach((link, index) => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          setActive(index);
        });
      });

      const init = () => {
        const active = links.find(a => a.parentElement.classList.contains('active')) || links[0];
        setIndicator(active);
      };

      init();

      window.addEventListener('resize', () => {
        const active = links.find(a => a.parentElement.classList.contains('active')) || links[0];
        setIndicator(active);
      });
    })();
  </script>
</body>
</html>
