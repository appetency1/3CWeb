<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商城素材预览 · 轮播图 & 商品图</title>
    <style>
        :root {
            --bg: #faf9f7;
            --card: #fff;
            --text: #1a1a1a;
            --muted: #666;
            --accent: #c45c4a;
            --border: #e8e5e0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 40px 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .subtitle { color: var(--muted); margin-bottom: 32px; }
        .section { margin-bottom: 60px; }
        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .section-title h2 { font-size: 20px; }
        .count { font-size: 13px; color: var(--muted); }
        .banner-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .banner-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .banner-card img {
            width: 100%;
            aspect-ratio: 16 / 7;
            object-fit: cover;
            display: block;
        }
        .banner-info { padding: 12px 14px; }
        .banner-info h3 { font-size: 14px; margin-bottom: 4px; }
        .banner-info p { font-size: 12px; color: var(--muted); }
        .banner-url {
            padding: 8px 14px;
            background: #f5f3f0;
            font-size: 11px;
            color: var(--muted);
            word-break: break-all;
            border-top: 1px solid var(--border);
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }
        .product-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .product-card img {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            display: block;
        }
        .product-info { padding: 10px; }
        .product-info h3 { font-size: 13px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .product-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }
        .price { color: var(--accent); font-weight: 600; }
        .sold { color: var(--muted); }
        .download-all {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 28px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(196,92,74,0.3);
        }
        .download-all:hover { background: #a84d3d; }
    </style>

        const categories = ["tops", "bottoms", "dresses", "outerwear", "shoes", "bags", "accessories", "lingerie", "sports"];

        const colors = ["黑色", "白色", "米色", "蓝色", "灰色", "粉色", "卡其", "藏蓝", "浅咖", "酒红"];
        const names = ["T恤", "衬衫", "针织衫", "毛衣", "卫衣", "牛仔裤", "休闲裤", "半身裙", "连衣裙", "风衣", "外套", "运动鞋", "手提包", "围巾", "帽子"];
        
        function random(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
        function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        const products = [];
        for (let i = 1; i <= 128; i++) {
            products.push({
                id: i,
                name: random(colors) + random(names),
                category: random(categories),
                price: rand(79, 999),
                brand: random(brands),
                image: productImages[i - 1],
                sold: rand(300, 5000),
                rating: (Math.random() * 0.4 + 4.5).toFixed(1),
                stock: rand(10, 250)
            });
        }

        const bannerGrid = document.getElementById('bannerGrid');
        banners.forEach(b => {
            bannerGrid.innerHTML += `
                <div class="banner-card">
                    <img src="${b.url}" alt="${b.name}" loading="lazy">
                    <div class="banner-info">
                        <h3>${b.name}</h3>
                        <p>${b.desc}</p>
                    </div>
                    <div class="banner-url">${b.url}</div>
                </div>
            `;
        });

        const productGrid = document.getElementById('productGrid');
        products.forEach(p => {
            productGrid.innerHTML += `
                <div class="product-card">
                    <img src="${p.image}" alt="${p.name}" loading="lazy">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <div class="product-meta">
                            <span class="price">¥${p.price}</span>
                            <span class="sold">已售 ${p.sold}</span>
                        </div>
                    </div>
                </div>
            `;
        });

        function downloadAll() {
            const allUrls = [...banners.map(b => b.url), ...products.map(p => p.image)];
            const uniqueUrls = [...new Set(allUrls)];
            
            uniqueUrls.forEach((url, index) => {
                setTimeout(() => {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = url.split('/').pop().split('?')[0] + '.jpg';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }, index * 300);
            });
        }
