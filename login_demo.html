<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — 登录</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
/* ===== 核心变量 ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #050508;
  --bg-elevated: #0a0a12;
  --bg-card: rgba(255,255,255,0.02);
  --bg-glass: rgba(10,10,18,0.65);
  --neon-blue: #00f0ff;
  --neon-blue-glow: rgba(0,240,255,0.4);
  --neon-violet: #b829f7;
  --neon-violet-glow: rgba(184,41,247,0.35);
  --neon-pink: #ff2a8a;
  --neon-pink-glow: rgba(255,42,138,0.35);
  --neon-green: #00ffa3;
  --text: #e8e8f0;
  --text2: #8a8aa8;
  --text3: #5a5a78;
  --border: rgba(0,240,255,0.08);
  --border-hover: rgba(0,240,255,0.25);
  --font-display: 'Orbitron', 'Rajdhani', sans-serif;
  --font-body: 'Noto Sans SC', sans-serif;
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  min-height: 100vh;
}

/* 扫描线 */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,240,255,0.012) 2px, rgba(0,240,255,0.012) 4px);
}

/* 3D 几何光环 Canvas */
#geo-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* ===== 页面布局 ===== */
.page {
  position: relative; z-index: 2;
  width: 100%; height: 100vh;
  display: flex;
}

/* ===== 左侧品牌区 ===== */
.hero-side {
  width: 55%; height: 100%;
  position: relative;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 60px;
  overflow: hidden;
  border-right: 1px solid var(--border);
}
.hero-side::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 30% 50%, rgba(0,240,255,0.06), transparent 55%),
    radial-gradient(ellipse at 70% 30%, rgba(184,41,247,0.04), transparent 50%);
}
.hero-grid-lines {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px),
    linear-gradient(0deg, rgba(0,240,255,0.03) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(ellipse at 50% 50%, black 20%, transparent 60%);
  -webkit-mask-image: radial-gradient(ellipse at 50% 50%, black 20%, transparent 60%);
}

.hero-brand {
  position: relative; z-index: 3;
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 48px;
}
.hero-brand .mark {
  width: 56px; height: 56px; border-radius: 16px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 800; font-size: 28px; color: #000;
  box-shadow: 0 0 36px var(--neon-blue-glow), inset 0 1px 0 rgba(255,255,255,0.3);
  position: relative; overflow: hidden;
}
.hero-brand .mark::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
  animation: shine 3s infinite;
}
@keyframes shine {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
.hero-brand .name {
  font-family: var(--font-display); font-size: 36px; font-weight: 700;
  letter-spacing: 6px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet), var(--neon-pink));
  background-size: 300% 300%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: gradient-flow 6s ease infinite;
}
@keyframes gradient-flow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.hero-content {
  position: relative; z-index: 3;
  text-align: center;
  max-width: 480px;
}
.hero-title {
  font-size: 52px; font-weight: 700; line-height: 1.1;
  margin-bottom: 20px;
  font-family: var(--font-display);
  letter-spacing: 1px;
}
.hero-title .gradient {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet), var(--neon-pink), var(--neon-blue));
  background-size: 300% 300%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: gradient-flow 6s ease infinite;
}
.hero-desc {
  font-size: 15px; color: var(--text2); line-height: 1.8;
  max-width: 360px; margin: 0 auto 48px;
}

/* 左侧文字层叠在 3D 效果之上 */
.hero-brand, .hero-content {
  position: relative;
  z-index: 2;
}

/* ===== 右侧表单区 ===== */
.form-side {
  width: 45%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  padding: 48px;
  position: relative;
}
.form-side::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 80% 50%, rgba(0,240,255,0.04), transparent 50%);
}

.login-card {
  position: relative; z-index: 2;
  width: 100%; max-width: 420px;
  background: linear-gradient(180deg, rgba(14,14,24,0.85), rgba(8,8,14,0.92));
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 48px 40px 40px;
  backdrop-filter: blur(32px) saturate(1.2);
  box-shadow: 0 32px 96px rgba(0,0,0,0.5), 0 0 60px rgba(0,240,255,0.04), inset 0 1px 0 rgba(255,255,255,0.04);
  transition: all 0.4s ease;
}
.login-card:hover {
  border-color: var(--border-hover);
  box-shadow: 0 40px 110px rgba(0,0,0,0.55), 0 0 80px rgba(0,240,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
}
/* 顶部光条 */
.login-card::before {
  content: ''; position: absolute; top: 0; left: 40px; right: 40px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-violet), transparent);
  opacity: 0.6;
}

.card-brand {
  text-align: center; margin-bottom: 32px;
}
.card-brand .mark {
  width: 48px; height: 48px; border-radius: 14px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 800; font-size: 22px; color: #000;
  margin: 0 auto 14px;
  box-shadow: 0 0 24px var(--neon-blue-glow);
}
.card-brand .name {
  font-family: var(--font-display); font-size: 22px; font-weight: 700;
  letter-spacing: 4px; margin-bottom: 6px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.card-brand .tagline {
  font-size: 11px; color: var(--text3); letter-spacing: 2px;
  font-family: var(--font-display); text-transform: uppercase;
}

/* Tabs */
.tabs {
  position: relative;
  display: flex; gap: 4px;
  background: rgba(255,255,255,0.03);
  padding: 4px;
  border-radius: 100px;
  margin-bottom: 32px;
  width: fit-content;
  margin-left: auto; margin-right: auto;
  border: 1px solid var(--border);
}
.tab {
  position: relative; z-index: 1;
  padding: 10px 32px;
  border-radius: 100px;
  border: none;
  background: transparent;
  font-family: var(--font-body);
  font-size: 14px; font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  transition: color 0.35s ease;
  letter-spacing: 1px;
}
.tab:hover { color: var(--text); }
.tab.active { color: #000; }
.tab-pill {
  position: absolute;
  top: 4px; left: 4px;
  width: calc(50% - 4px); height: calc(100% - 8px);
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet));
  border-radius: 100px;
  box-shadow: 0 4px 24px rgba(0,240,255,0.15);
  transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 0;
}
.tab-pill.register {
  transform: translateX(100%);
}

/* Form */
.form { display: none; }
.form.active { display: block; animation: formIn 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
@keyframes formIn {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

.field { position: relative; margin-bottom: 20px; }
.field-input {
  width: 100%; height: 56px;
  padding: 20px 46px 8px 16px;
  background: rgba(255,255,255,0.03);
  border: 1.5px solid rgba(0,240,255,0.1);
  border-radius: 14px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  outline: none;
  transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  box-sizing: border-box;
}
.field-input:hover { border-color: rgba(0,240,255,0.18); }
.field-input:focus {
  border-color: var(--neon-blue);
  background: rgba(0,240,255,0.02);
  box-shadow: 0 0 0 4px rgba(0,240,255,0.06), 0 0 24px rgba(0,240,255,0.08);
}
.field-label {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  font-size: 14px; color: var(--text3);
  pointer-events: none;
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  transform-origin: left top;
}
.field-input:focus + .field-label,
.field-input:not(:placeholder-shown) + .field-label {
  top: 10px;
  transform: translateY(0) scale(0.72);
  color: var(--neon-blue);
  font-weight: 600;
}
.field-icon {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--text3);
  cursor: pointer;
  padding: 4px;
  display: flex;
  transition: color 0.3s, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.field-icon:hover { color: var(--neon-blue); transform: translateY(-50%) scale(1.1); }

.options {
  display: flex; justify-content: space-between; align-items: center;
  margin: -2px 0 26px; font-size: 12px;
}
.checkbox {
  display: flex; align-items: center; gap: 9px;
  color: var(--text2); cursor: pointer; font-weight: 500;
  transition: color 0.3s;
}
.checkbox:hover { color: var(--text); }
.checkbox input {
  appearance: none;
  width: 17px; height: 17px;
  border: 1.5px solid var(--border);
  border-radius: 5px;
  background: transparent;
  cursor: pointer;
  position: relative;
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  flex-shrink: 0;
}
.checkbox input:checked {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet));
  border-color: transparent;
  transform: scale(1.05);
}
.checkbox input:checked::after {
  content: '';
  position: absolute;
  left: 5px; top: 2px;
  width: 4px; height: 7px;
  border: solid white;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
  animation: tick 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes tick {
  0% { transform: rotate(45deg) scale(0); }
  70% { transform: rotate(45deg) scale(1.2); }
  100% { transform: rotate(45deg) scale(1); }
}
.link {
  color: var(--neon-blue); text-decoration: none; font-weight: 600; font-size: 12px;
  position: relative; transition: color 0.3s;
}
.link::after {
  content: ''; position: absolute; left: 0; bottom: -2px;
  width: 0; height: 1px;
  background: linear-gradient(90deg, var(--neon-blue), var(--neon-violet));
  transition: width 0.3s cubic-bezier(0.22, 1, 0.36, 1);
}
.link:hover { color: var(--neon-violet); }
.link:hover::after { width: 100%; }

.btn {
  width: 100%; height: 54px;
  border: none; border-radius: 16px;
  font-family: var(--font-body); font-size: 14px; font-weight: 700;
  letter-spacing: 2px; cursor: pointer;
  position: relative; overflow: hidden;
  transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  color: #000;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet));
  box-shadow: 0 8px 32px rgba(0,240,255,0.2);
}
.btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transform: translateX(-100%);
  transition: transform 0.6s;
}
.btn:hover::before { transform: translateX(100%); }
.btn:hover {
  box-shadow: 0 14px 48px rgba(0,240,255,0.35), 0 0 20px rgba(184,41,247,0.15);
  transform: translateY(-2px);
}
.btn:active { transform: translateY(0); }

.divider {
  display: flex; align-items: center; gap: 16px;
  margin: 24px 0;
  color: var(--text3); font-size: 11px; font-weight: 500;
  letter-spacing: 1px; text-transform: uppercase;
  font-family: var(--font-display);
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
}

.social { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.social-btn {
  height: 48px;
  background: rgba(255,255,255,0.03);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  color: var(--text2);
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.social-btn:hover {
  border-color: var(--border-hover);
  color: var(--text);
  background: rgba(0,240,255,0.03);
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}
.social-btn svg { width: 18px; height: 18px; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
.social-btn:hover svg { transform: scale(1.15) rotate(-4deg); }

.terms {
  font-size: 11px; color: var(--text3); line-height: 1.6;
  margin-top: 6px; text-align: center;
}
.terms a { color: var(--neon-blue); text-decoration: none; }
.terms a:hover { text-decoration: underline; }

/* ===== 响应式 ===== */
@media (max-width: 960px) {
  .hero-side { display: none; }
  .form-side { width: 100%; padding: 32px; }
}
@media (max-width: 480px) {
  .login-card { padding: 36px 24px 30px; border-radius: 24px; }
  .tab { padding: 10px 24px; }
  .hero-title { font-size: 40px; }
}
</style>
</head>
<body>

<div class="page">
  <!-- 左侧品牌区 -->
  <div class="hero-side">
    <div class="hero-grid-lines"></div>
    <canvas id="geo-canvas"></canvas>
    <div class="hero-brand">
      <div class="mark">N</div>
      <div class="name">NEXUS</div>
    </div>
    <div class="hero-content">
      <h1 class="hero-title">接入<br><span class="gradient">数字未来</span></h1>
      <p class="hero-desc">探索前沿科技，开启属于你的数字生活方式。从旗舰设备到智能生态，NEXUS 为你连接无限可能。</p>
    </div>
  </div>

  <!-- 右侧表单区 -->
  <div class="form-side">
    <div class="login-card">
      <!-- 顶部品牌 -->
      <div class="card-brand">
        <div class="mark">N</div>
        <div class="name">NEXUS</div>
        <div class="tagline">精选数码 · 未来已来</div>
      </div>

      <!-- Tabs -->
      <div class="tabs" id="tabs">
        <div class="tab-pill" id="tabPill"></div>
        <button class="tab active" data-tab="login">登录</button>
        <button class="tab" data-tab="register">注册</button>
      </div>

      <!-- 登录表单 -->
      <form class="form active" id="formLogin">
        <div class="field">
          <input type="text" class="field-input" placeholder=" " autocomplete="username" />
          <label class="field-label">用户名 / 手机号</label>
        </div>
        <div class="field">
          <input type="password" class="field-input" placeholder=" " autocomplete="current-password" id="loginPwd" />
          <label class="field-label">密码</label>
          <button type="button" class="field-icon" onclick="togglePwd('loginPwd',this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="options">
          <label class="checkbox"><input type="checkbox" checked /><span>记住我</span></label>
          <a href="#" class="link">忘记密码？</a>
        </div>
        <button type="button" class="btn" onclick="alert('登录演示')">登 录</button>
      </form>

      <!-- 注册表单 -->
      <form class="form" id="formRegister">
        <div class="field">
          <input type="text" class="field-input" placeholder=" " autocomplete="username" />
          <label class="field-label">用户名</label>
        </div>
        <div class="field">
          <input type="tel" class="field-input" placeholder=" " autocomplete="tel" />
          <label class="field-label">手机号</label>
        </div>
        <div class="field">
          <input type="password" class="field-input" placeholder=" " autocomplete="new-password" id="regPwd" />
          <label class="field-label">密码</label>
          <button type="button" class="field-icon" onclick="togglePwd('regPwd',this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="field">
          <input type="password" class="field-input" placeholder=" " autocomplete="new-password" />
          <label class="field-label">确认密码</label>
        </div>
        <div class="options" style="margin-bottom:18px">
          <label class="checkbox"><input type="checkbox" /><span>我已阅读并同意</span></label>
        </div>
        <p class="terms"><a href="#">用户协议</a> 和 <a href="#">隐私政策</a></p>
        <button type="button" class="btn" style="margin-top:18px" onclick="alert('注册演示')">注 册</button>
      </form>

      <div class="divider">或使用以下方式</div>
      <div class="social">
        <button class="social-btn" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 01.213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 00.167-.054l1.903-1.114a.864.864 0 01.717-.098 10.16 10.16 0 002.837.403c.276 0 .543-.027.811-.05a6.093 6.093 0 01-.305-1.855c0-3.564 3.348-6.456 7.473-6.456.26 0 .515.013.768.037C15.627 4.69 12.47 2.188 8.691 2.188z"/></svg>
          微信
        </button>
        <button class="social-btn" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/></svg>
          Google
        </button>
      </div>
    </div>
  </div>
</div>

<script type="module">
/* ===== Tab 切换 ===== */
const tabs = document.querySelectorAll('[data-tab]');
const pill = document.getElementById('tabPill');
const formLogin = document.getElementById('formLogin');
const formRegister = document.getElementById('formRegister');
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const target = tab.dataset.tab;
    if (target === 'register') {
      pill.classList.add('register');
      formLogin.classList.remove('active');
      formRegister.classList.add('active');
    } else {
      pill.classList.remove('register');
      formRegister.classList.remove('active');
      formLogin.classList.add('active');
    }
  });
});

/* ===== 密码可见切换 ===== */
function togglePwd(id, btn) {
  const input = document.getElementById(id);
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  btn.innerHTML = isText
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

/* ===== Three.js 3D 几何光环 ===== */
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

(function initGeoAura() {
  const canvas = document.getElementById('geo-canvas');
  const container = canvas.parentElement;
  if (!canvas || !container) return;

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x050508, 0.008);

  const width = container.clientWidth;
  const height = container.clientHeight;

  const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
  camera.position.set(3, 2, 5);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ReinhardToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.setClearColor(0x000000, 0);

  const renderScene = new RenderPass(scene, camera);
  const bloomPass = new UnrealBloomPass(new THREE.Vector2(width, height), 1.2, 0.3, 0.85);
  bloomPass.threshold = 0.1;
  bloomPass.strength = 0.8;
  bloomPass.radius = 0.5;

  const effectComposer = new EffectComposer(renderer);
  effectComposer.addPass(renderScene);
  effectComposer.addPass(bloomPass);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 1.2;
  controls.enableZoom = false;
  controls.enablePan = false;
  controls.enableRotate = false;
  controls.target.set(0, 0, 0);

  const ambientLight = new THREE.AmbientLight(0x222222);
  scene.add(ambientLight);
  const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
  mainLight.position.set(2, 3, 4);
  scene.add(mainLight);
  const backLight = new THREE.PointLight(0x4466cc, 0.6);
  backLight.position.set(-2, 1, -3);
  scene.add(backLight);
  const fillLight = new THREE.PointLight(0xffaa66, 0.5);
  fillLight.position.set(1.5, 1, 2);
  scene.add(fillLight);
  const colorLight = new THREE.PointLight(0xffaa44, 0.8);
  colorLight.position.set(1, 1, 2);
  scene.add(colorLight);

  /* 将所有核心几何体放入一个组，整体左移，实现“放到左边” */
  const auraGroup = new THREE.Group();
  auraGroup.position.set(-2.8, -0.2, 0);
  auraGroup.scale.setScalar(0.88);
  scene.add(auraGroup);

  const starGeometry = new THREE.BufferGeometry();
  const starCount = 800;
  const starPositions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    starPositions[i * 3] = 200 * (Math.random() - 0.5);
    starPositions[i * 3 + 1] = 100 * (Math.random() - 0.5);
    starPositions[i * 3 + 2] = 80 * (Math.random() - 0.5) - 40;
  }
  starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  const starMaterial = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.08, transparent: true, opacity: 0.6 });
  const stars = new THREE.Points(starGeometry, starMaterial);
  scene.add(stars);

  const geometryIco = new THREE.IcosahedronGeometry(1.1, 0);
  const materialMain = new THREE.MeshStandardMaterial({ color: 0x4a7c4c, emissive: 0x112233, roughness: 0.28, metalness: 0.75, flatShading: false, transparent: true, opacity: 0.92 });
  const coreMesh = new THREE.Mesh(geometryIco, materialMain);
  auraGroup.add(coreMesh);

  const wireframeMat = new THREE.MeshBasicMaterial({ color: 0x66ccff, wireframe: true, transparent: true, opacity: 0.25 });
  const wireframeIco = new THREE.Mesh(geometryIco, wireframeMat);
  wireframeIco.scale.setScalar(1.08);
  auraGroup.add(wireframeIco);

  const ringParticleCount = 1200;
  const ringGeometry = new THREE.BufferGeometry();
  const ringPositions = new Float32Array(ringParticleCount * 3);
  const ringColors = new Float32Array(ringParticleCount * 3);
  for (let i = 0; i < ringParticleCount; i++) {
    const t = (i / ringParticleCount) * Math.PI * 2;
    const r = 1.55;
    ringPositions[i * 3] = Math.cos(t) * r;
    ringPositions[i * 3 + 1] = 0.35 * Math.sin(3 * t);
    ringPositions[i * 3 + 2] = Math.sin(t) * r;
    ringColors[i * 3] = 0.4 + 0.6 * Math.sin(t);
    ringColors[i * 3 + 1] = 0.3 + 0.7 * Math.cos(1.7 * t);
    ringColors[i * 3 + 2] = 0.8 + 0.2 * Math.sin(2.3 * t);
  }
  ringGeometry.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
  ringGeometry.setAttribute('color', new THREE.BufferAttribute(ringColors, 3));
  const ringMaterial = new THREE.PointsMaterial({ size: 0.05, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending });
  const ringParticles = new THREE.Points(ringGeometry, ringMaterial);
  auraGroup.add(ringParticles);

  const torusMat = new THREE.MeshStandardMaterial({ color: 0x88aadd, emissive: 0x225522, roughness: 0.3, metalness: 0.9 });
  const torusRing = new THREE.Mesh(new THREE.TorusGeometry(1.45, 0.045, 64, 500), torusMat);
  auraGroup.add(torusRing);

  const torusRing2 = new THREE.Mesh(new THREE.TorusGeometry(1.68, 0.03, 64, 500), torusMat.clone());
  torusRing2.material.color.setHex(0xffcc66);
  torusRing2.material.emissive.setHex(0x442200);
  torusRing2.material.roughness = 0.5;
  torusRing2.material.metalness = 0.7;
  auraGroup.add(torusRing2);

  const cloudParticleCount = 800;
  const cloudGeo = new THREE.BufferGeometry();
  const cloudPositions = new Float32Array(cloudParticleCount * 3);
  for (let i = 0; i < cloudParticleCount; i++) {
    cloudPositions[i * 3] = 5 * (Math.random() - 0.5);
    cloudPositions[i * 3 + 1] = 3 * (Math.random() - 0.5);
    cloudPositions[i * 3 + 2] = 4 * (Math.random() - 0.5) - 1;
  }
  cloudGeo.setAttribute('position', new THREE.BufferAttribute(cloudPositions, 3));
  const cloudMat = new THREE.PointsMaterial({ color: 0x77aaff, size: 0.025, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
  const cloudPoints = new THREE.Points(cloudGeo, cloudMat);
  auraGroup.add(cloudPoints);

  const gridHelper = new THREE.GridHelper(12, 24, 0x88aadd, 0x334466);
  gridHelper.position.y = -1.8;
  gridHelper.material.transparent = true;
  gridHelper.material.opacity = 0.2;
  auraGroup.add(gridHelper);

  let time = 0;
  function animate() {
    requestAnimationFrame(animate);
    time += 0.012;
    coreMesh.rotation.y = 0.25 * time;
    coreMesh.rotation.x = 0.2 * Math.sin(0.37 * time);
    coreMesh.rotation.z = 0.15 * Math.cos(0.23 * time);
    wireframeIco.rotation.copy(coreMesh.rotation);
    ringParticles.rotation.y = 0.35 * time;
    ringParticles.rotation.x = 0.2 * Math.sin(0.28 * time);
    torusRing.rotation.x = Math.PI / 2;
    torusRing.rotation.z = 0.5 * time;
    torusRing2.rotation.x = Math.PI / 2 + 0.3;
    torusRing2.rotation.z = 0.65 * time;
    const e = (0.2 * time) % (2 * Math.PI);
    colorLight.color.setHSL(0.55 + 0.1 * Math.sin(e), 1, 0.6);
    stars.rotation.y += 0.0005;
    stars.rotation.x += 0.0003;
    cloudPoints.rotation.y = 0.05 * time;
    cloudPoints.rotation.x = 0.1 * Math.sin(0.1 * time);
    controls.update();
    effectComposer.render();
  }
  animate();

  const ro = new ResizeObserver(() => {
    const w = container.clientWidth;
    const h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    effectComposer.setSize(w, h);
  });
  ro.observe(container);
})();
</script>
