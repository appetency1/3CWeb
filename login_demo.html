<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — 登录</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
/* ===== 核心变量 ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #050508;
  --bg-elevated: #0a0a12;
  --bg-card: rgba(255,255,255,0.02);
  --bg-glass: rgba(10,10,18,0.65);
  --neon-blue: #00f0ff;
  --neon-blue-glow: rgba(0,240,255,0.4);
  --neon-violet: #b829f7;
  --neon-violet-glow: rgba(184,41,247,0.35);
  --neon-pink: #ff2a8a;
  --neon-pink-glow: rgba(255,42,138,0.35);
  --neon-green: #00ffa3;
  --text: #e8e8f0;
  --text2: #8a8aa8;
  --text3: #5a5a78;
  --border: rgba(0,240,255,0.08);
  --border-hover: rgba(0,240,255,0.25);
  --font-display: 'Orbitron', 'Rajdhani', sans-serif;
  --font-body: 'Noto Sans SC', sans-serif;
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  min-height: 100vh;
}

/* 扫描线 */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,240,255,0.012) 2px, rgba(0,240,255,0.012) 4px);
}

/* Canvas 背景 */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ===== 页面布局 ===== */
.page {
  position: relative; z-index: 2;
  width: 100%; height: 100vh;
  display: flex;
}

/* ===== 左侧品牌区 ===== */
.hero-side {
  width: 55%; height: 100%;
  position: relative;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 60px;
  overflow: hidden;
}
.hero-side::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 30% 50%, rgba(0,240,255,0.06), transparent 55%),
    radial-gradient(ellipse at 70% 30%, rgba(184,41,247,0.04), transparent 50%);
}
.hero-grid-lines {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px),
    linear-gradient(0deg, rgba(0,240,255,0.03) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(ellipse at 50% 50%, black 20%, transparent 60%);
  -webkit-mask-image: radial-gradient(ellipse at 50% 50%, black 20%, transparent 60%);
}

.hero-brand {
  position: relative; z-index: 3;
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 48px;
}
.hero-brand .mark {
  width: 56px; height: 56px; border-radius: 16px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 800; font-size: 28px; color: #000;
  box-shadow: 0 0 36px var(--neon-blue-glow), inset 0 1px 0 rgba(255,255,255,0.3);
  position: relative; overflow: hidden;
}
.hero-brand .mark::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
  animation: shine 3s infinite;
}
@keyframes shine {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
.hero-brand .name {
  font-family: var(--font-display); font-size: 36px; font-weight: 700;
  letter-spacing: 6px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet), var(--neon-pink));
  background-size: 300% 300%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: gradient-flow 6s ease infinite;
}
@keyframes gradient-flow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.hero-content {
  position: relative; z-index: 3;
  text-align: center;
  max-width: 480px;
}
.hero-title {
  font-size: 52px; font-weight: 700; line-height: 1.1;
  margin-bottom: 20px;
  font-family: var(--font-display);
  letter-spacing: 1px;
}
.hero-title .gradient {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet), var(--neon-pink), var(--neon-blue));
  background-size: 300% 300%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: gradient-flow 6s ease infinite;
}
.hero-desc {
  font-size: 15px; color: var(--text2); line-height: 1.8;
  max-width: 360px; margin: 0 auto 48px;
}

/* 3D 球体容器 */
.hero-orb-wrap {
  width: 320px; height: 320px;
  animation: float 6s ease-in-out infinite;
  position: relative;
  z-index: 3;
}
#three-orb-container canvas {
  display: block;
  width: 100% !important;
  height: 100% !important;
  border-radius: 50%;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-16px); }
}

/* ===== 右侧表单区 ===== */
.form-side {
  width: 45%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  padding: 48px;
  position: relative;
}
.form-side::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 80% 50%, rgba(0,240,255,0.04), transparent 50%);
}

.login-card {
  position: relative; z-index: 2;
  width: 100%; max-width: 420px;
  background: linear-gradient(180deg, rgba(14,14,24,0.85), rgba(8,8,14,0.92));
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 48px 40px 40px;
  backdrop-filter: blur(32px) saturate(1.2);
  box-shadow: 0 32px 96px rgba(0,0,0,0.5), 0 0 60px rgba(0,240,255,0.04), inset 0 1px 0 rgba(255,255,255,0.04);
  transition: all 0.4s ease;
}
.login-card:hover {
  border-color: var(--border-hover);
  box-shadow: 0 40px 110px rgba(0,0,0,0.55), 0 0 80px rgba(0,240,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
}
/* 顶部光条 */
.login-card::before {
  content: ''; position: absolute; top: 0; left: 40px; right: 40px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-violet), transparent);
  opacity: 0.6;
}

.card-brand {
  text-align: center; margin-bottom: 32px;
}
.card-brand .mark {
  width: 48px; height: 48px; border-radius: 14px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 800; font-size: 22px; color: #000;
  margin: 0 auto 14px;
  box-shadow: 0 0 24px var(--neon-blue-glow);
}
.card-brand .name {
  font-family: var(--font-display); font-size: 22px; font-weight: 700;
  letter-spacing: 4px; margin-bottom: 6px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.card-brand .tagline {
  font-size: 11px; color: var(--text3); letter-spacing: 2px;
  font-family: var(--font-display); text-transform: uppercase;
}

/* Tabs */
.tabs {
  position: relative;
  display: flex; gap: 4px;
  background: rgba(255,255,255,0.03);
  padding: 4px;
  border-radius: 100px;
  margin-bottom: 32px;
  width: fit-content;
  margin-left: auto; margin-right: auto;
  border: 1px solid var(--border);
}
.tab {
  position: relative; z-index: 1;
  padding: 10px 32px;
  border-radius: 100px;
  border: none;
  background: transparent;
  font-family: var(--font-body);
  font-size: 14px; font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  transition: color 0.35s ease;
  letter-spacing: 1px;
}
.tab:hover { color: var(--text); }
.tab.active { color: #000; }
.tab-pill {
  position: absolute;
  top: 4px; left: 4px;
  width: calc(50% - 4px); height: calc(100% - 8px);
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet));
  border-radius: 100px;
  box-shadow: 0 4px 24px rgba(0,240,255,0.15);
  transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 0;
}
.tab-pill.register {
  transform: translateX(100%);
}

/* Form */
.form { display: none; }
.form.active { display: block; animation: formIn 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
@keyframes formIn {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

.field { position: relative; margin-bottom: 20px; }
.field-input {
  width: 100%; height: 56px;
  padding: 20px 46px 8px 16px;
  background: rgba(255,255,255,0.03);
  border: 1.5px solid rgba(0,240,255,0.1);
  border-radius: 14px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  outline: none;
  transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  box-sizing: border-box;
}
.field-input:hover { border-color: rgba(0,240,255,0.18); }
.field-input:focus {
  border-color: var(--neon-blue);
  background: rgba(0,240,255,0.02);
  box-shadow: 0 0 0 4px rgba(0,240,255,0.06), 0 0 24px rgba(0,240,255,0.08);
}
.field-label {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  font-size: 14px; color: var(--text3);
  pointer-events: none;
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  transform-origin: left top;
}
.field-input:focus + .field-label,
.field-input:not(:placeholder-shown) + .field-label {
  top: 10px;
  transform: translateY(0) scale(0.72);
  color: var(--neon-blue);
  font-weight: 600;
}
.field-icon {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--text3);
  cursor: pointer;
  padding: 4px;
  display: flex;
  transition: color 0.3s, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.field-icon:hover { color: var(--neon-blue); transform: translateY(-50%) scale(1.1); }

.options {
  display: flex; justify-content: space-between; align-items: center;
  margin: -2px 0 26px; font-size: 12px;
}
.checkbox {
  display: flex; align-items: center; gap: 9px;
  color: var(--text2); cursor: pointer; font-weight: 500;
  transition: color 0.3s;
}
.checkbox:hover { color: var(--text); }
.checkbox input {
  appearance: none;
  width: 17px; height: 17px;
  border: 1.5px solid var(--border);
  border-radius: 5px;
  background: transparent;
  cursor: pointer;
  position: relative;
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  flex-shrink: 0;
}
.checkbox input:checked {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet));
  border-color: transparent;
  transform: scale(1.05);
}
.checkbox input:checked::after {
  content: '';
  position: absolute;
  left: 5px; top: 2px;
  width: 4px; height: 7px;
  border: solid white;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
  animation: tick 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes tick {
  0% { transform: rotate(45deg) scale(0); }
  70% { transform: rotate(45deg) scale(1.2); }
  100% { transform: rotate(45deg) scale(1); }
}
.link {
  color: var(--neon-blue); text-decoration: none; font-weight: 600; font-size: 12px;
  position: relative; transition: color 0.3s;
}
.link::after {
  content: ''; position: absolute; left: 0; bottom: -2px;
  width: 0; height: 1px;
  background: linear-gradient(90deg, var(--neon-blue), var(--neon-violet));
  transition: width 0.3s cubic-bezier(0.22, 1, 0.36, 1);
}
.link:hover { color: var(--neon-violet); }
.link:hover::after { width: 100%; }

.btn {
  width: 100%; height: 54px;
  border: none; border-radius: 16px;
  font-family: var(--font-body); font-size: 14px; font-weight: 700;
  letter-spacing: 2px; cursor: pointer;
  position: relative; overflow: hidden;
  transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  color: #000;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet));
  box-shadow: 0 8px 32px rgba(0,240,255,0.2);
}
.btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transform: translateX(-100%);
  transition: transform 0.6s;
}
.btn:hover::before { transform: translateX(100%); }
.btn:hover {
  box-shadow: 0 14px 48px rgba(0,240,255,0.35), 0 0 20px rgba(184,41,247,0.15);
  transform: translateY(-2px);
}
.btn:active { transform: translateY(0); }

.divider {
  display: flex; align-items: center; gap: 16px;
  margin: 24px 0;
  color: var(--text3); font-size: 11px; font-weight: 500;
  letter-spacing: 1px; text-transform: uppercase;
  font-family: var(--font-display);
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
}

.social { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.social-btn {
  height: 48px;
  background: rgba(255,255,255,0.03);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  color: var(--text2);
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.social-btn:hover {
  border-color: var(--border-hover);
  color: var(--text);
  background: rgba(0,240,255,0.03);
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}
.social-btn svg { width: 18px; height: 18px; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
.social-btn:hover svg { transform: scale(1.15) rotate(-4deg); }

.terms {
  font-size: 11px; color: var(--text3); line-height: 1.6;
  margin-top: 6px; text-align: center;
}
.terms a { color: var(--neon-blue); text-decoration: none; }
.terms a:hover { text-decoration: underline; }

/* ===== 响应式 ===== */
@media (max-width: 960px) {
  .hero-side { display: none; }
  .form-side { width: 100%; padding: 32px; }
}
@media (max-width: 480px) {
  .login-card { padding: 36px 24px 30px; border-radius: 24px; }
  .tab { padding: 10px 24px; }
  .hero-title { font-size: 40px; }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="page">
  <!-- 左侧品牌区 -->
  <div class="hero-side">
    <div class="hero-grid-lines"></div>
    <div class="hero-brand">
      <div class="mark">N</div>
      <div class="name">NEXUS</div>
    </div>
    <div class="hero-content">
      <h1 class="hero-title">接入<br><span class="gradient">数字未来</span></h1>
      <p class="hero-desc">探索前沿科技，开启属于你的数字生活方式。从旗舰设备到智能生态，NEXUS 为你连接无限可能。</p>
    </div>
    <div class="hero-orb-wrap">
      <div id="three-orb-container" style="width: 100%; height: 100%;"></div>
    </div>
  </div>

  <!-- 右侧表单区 -->
  <div class="form-side">
    <div class="login-card">
      <!-- 顶部品牌 -->
      <div class="card-brand">
        <div class="mark">N</div>
        <div class="name">NEXUS</div>
        <div class="tagline">精选数码 · 未来已来</div>
      </div>

      <!-- Tabs -->
      <div class="tabs" id="tabs">
        <div class="tab-pill" id="tabPill"></div>
        <button class="tab active" data-tab="login">登录</button>
        <button class="tab" data-tab="register">注册</button>

      <!-- 登录表单 -->
      <form class="form active" id="formLogin">
        <div class="field">
          <input type="text" class="field-input" placeholder=" " autocomplete="username" />
          <label class="field-label">用户名 / 手机号</label>
        </div>
        <div class="field">
          <input type="password" class="field-input" placeholder=" " autocomplete="current-password" id="loginPwd" />
          <label class="field-label">密码</label>
          <button type="button" class="field-icon" onclick="togglePwd('loginPwd',this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="options">
          <label class="checkbox"><input type="checkbox" checked /><span>记住我</span></label>
          <a href="#" class="link">忘记密码？</a>
        </div>
        <button type="button" class="btn" onclick="alert('登录演示')">登 录</button>
      </form>

      <!-- 注册表单 -->
      <form class="form" id="formRegister">
        <div class="field">
          <input type="text" class="field-input" placeholder=" " autocomplete="username" />
          <label class="field-label">用户名</label>
        </div>
        <div class="field">
          <input type="tel" class="field-input" placeholder=" " autocomplete="tel" />
          <label class="field-label">手机号</label>
        </div>
        <div class="field">
          <input type="password" class="field-input" placeholder=" " autocomplete="new-password" id="regPwd" />
          <label class="field-label">密码</label>
          <button type="button" class="field-icon" onclick="togglePwd('regPwd',this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="field">
          <input type="password" class="field-input" placeholder=" " autocomplete="new-password" />
          <label class="field-label">确认密码</label>
        </div>
        <div class="options" style="margin-bottom:18px">
          <label class="checkbox"><input type="checkbox" /><span>我已阅读并同意</span></label>
        </div>
        <p class="terms"><a href="#">用户协议</a> 和 <a href="#">隐私政策</a></p>
        <button type="button" class="btn" style="margin-top:18px" onclick="alert('注册演示')">注 册</button>
      </form>

      <div class="divider">或使用以下方式</div>
      <div class="social">
        <button class="social-btn" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 01.213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 00.167-.054l1.903-1.114a.864.864 0 01.717-.098 10.16 10.16 0 002.837.403c.276 0 .543-.027.811-.05a6.093 6.093 0 01-.305-1.855c0-3.564 3.348-6.456 7.473-6.456.26 0 .515.013.768.037C15.627 4.69 12.47 2.188 8.691 2.188z"/></svg>
          微信
        </button>
        <button class="social-btn" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/></svg>
          Google
        </button>
      </div>
    </div>
  </div>
</div>

<script type="module">
/* ===== Canvas 粒子连线背景 ===== */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);
class Particle {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = (Math.random() - 0.5) * 0.4;
    this.size = Math.random() * 1.5 + 0.5;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.x < 0 || this.x > W) this.vx *= -1;
    if (this.y < 0 || this.y > H) this.vy *= -1;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,240,255,0.2)';
    ctx.fill();
  }
}
for (let i = 0; i < 50; i++) particles.push(new Particle());
function drawLines() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 150) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(0,240,255,${0.08 * (1 - dist/150)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}
function animate() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => { p.update(); p.draw(); });
  drawLines();
  requestAnimationFrame(animate);
}
animate();

/* ===== Three.js 3D 等离子球体 ===== */
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

(function initThreeOrb() {
  const container = document.getElementById('three-orb-container');
  if (!container) return;

  const width = container.clientWidth;
  const height = container.clientHeight;

  // Scene
  const scene = new THREE.Scene();
  // Transparent background so CSS background shows through

  const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);
  camera.position.z = 2.6;

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  container.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.enablePan = false;
  controls.enableZoom = false;
  controls.minDistance = 1.5;
  controls.maxDistance = 20;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 1.2;

  const mainGroup = new THREE.Group();
  scene.add(mainGroup);

  // --- GLSL NOISE FUNCTIONS ---
  const noiseFunctions = `
    vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
    vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

    float snoise(vec3 v) {
      const vec2 C = vec2(1.0/6.0, 1.0/3.0);
      const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
      vec3 i = floor(v + dot(v, C.yyy));
      vec3 x0 = v - i + dot(i, C.xxx);
      vec3 g = step(x0.yzx, x0.xyz);
      vec3 l = 1.0 - g;
      vec3 i1 = min(g.xyz, l.zxy);
      vec3 i2 = max(g.xyz, l.zxy);
      vec3 x1 = x0 - i1 + C.xxx;
      vec3 x2 = x0 - i2 + C.yyy;
      vec3 x3 = x0 - D.yyy;
      i = mod289(i);
      vec4 p = permute(permute(permute(
        i.z + vec4(0.0, i1.z, i2.z, 1.0))
        + i.y + vec4(0.0, i1.y, i2.y, 1.0))
        + i.x + vec4(0.0, i1.x, i2.x, 1.0));
      float n_ = 0.142857142857;
      vec3 ns = n_ * D.wyz - D.xzx;
      vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
      vec4 x_ = floor(j * ns.z);
      vec4 y_ = floor(j - 7.0 * x_);
      vec4 x = x_ * ns.x + ns.yyyy;
      vec4 y = y_ * ns.x + ns.yyyy;
      vec4 h = 1.0 - abs(x) - abs(y);
      vec4 b0 = vec4(x.xy, y.xy);
      vec4 b1 = vec4(x.zw, y.zw);
      vec4 s0 = floor(b0)*2.0 + 1.0;
      vec4 s1 = floor(b1)*2.0 + 1.0;
      vec4 sh = -step(h, vec4(0.0));
      vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
      vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
      vec3 p0 = vec3(a0.xy,h.x);
      vec3 p1 = vec3(a0.zw,h.y);
      vec3 p2 = vec3(a1.xy,h.z);
      vec3 p3 = vec3(a1.zw,h.w);
      vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
      p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
      vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
      m = m * m;
      return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
    }

    float fbm(vec3 p) {
      float total = 0.0;
      float amplitude = 0.5;
      float frequency = 1.0;
      for (int i = 0; i < 3; i++) {
        total += snoise(p * frequency) * amplitude;
        amplitude *= 0.5;
        frequency *= 2.0;
      }
      return total;
    }
  `;

  // Light
  const pointLight = new THREE.PointLight(0x0088ff, 2.5, 10);
  mainGroup.add(pointLight);

  // --- OUTER SHELL (Glass) ---
  const shellGeo = new THREE.SphereGeometry(1.0, 64, 64);

  const shellShader = {
    vertexShader: `
      varying vec3 vNormal;
      varying vec3 vViewPosition;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        vViewPosition = -mvPosition.xyz;
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader: `
      varying vec3 vNormal;
      varying vec3 vViewPosition;
      uniform vec3 uColor;
      uniform float uOpacity;
      void main() {
        float fresnel = pow(1.0 - dot(normalize(vNormal), normalize(vViewPosition)), 2.5);
        gl_FragColor = vec4(uColor, fresnel * uOpacity);
      }
    `
  };

  const shellBackMat = new THREE.ShaderMaterial({
    vertexShader: shellShader.vertexShader,
    fragmentShader: shellShader.fragmentShader,
    uniforms: {
      uColor: { value: new THREE.Color(0x2a0044) },
      uOpacity: { value: 0.3 }
    },
    transparent: true,
    blending: THREE.AdditiveBlending,
    side: THREE.BackSide,
    depthWrite: false
  });

  const shellFrontMat = new THREE.ShaderMaterial({
    vertexShader: shellShader.vertexShader,
    fragmentShader: shellShader.fragmentShader,
    uniforms: {
      uColor: { value: new THREE.Color(0xb829f7) },
      uOpacity: { value: 0.45 }
    },
    transparent: true,
    blending: THREE.AdditiveBlending,
    side: THREE.FrontSide,
    depthWrite: false
  });

  mainGroup.add(new THREE.Mesh(shellGeo, shellBackMat));
  mainGroup.add(new THREE.Mesh(shellGeo, shellFrontMat));

  // --- PLASMA (Gas) ---
  const plasmaGeo = new THREE.SphereGeometry(0.998, 128, 128);
  const plasmaMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uScale: { value: 0.22 },
      uBrightness: { value: 1.4 },
      uThreshold: { value: 0.09 },
      uColorDeep: { value: new THREE.Color(0x0a001a) },
      uColorMid: { value: new THREE.Color(0x00f0ff) },
      uColorBright: { value: new THREE.Color(0xff2a8a) }
    },
    vertexShader: `
      varying vec3 vPosition;
      varying vec3 vNormal;
      varying vec3 vViewPosition;
      void main() {
        vPosition = position;
        vNormal = normalize(normalMatrix * normal);
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        vViewPosition = -mvPosition.xyz;
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform float uScale;
      uniform float uBrightness;
      uniform float uThreshold;
      uniform vec3 uColorDeep;
      uniform vec3 uColorMid;
      uniform vec3 uColorBright;
      varying vec3 vPosition;
      varying vec3 vNormal;
      varying vec3 vViewPosition;
      ${noiseFunctions}
      void main() {
        vec3 p = vPosition * uScale;
        vec3 q = vec3(
          fbm(p + vec3(0.0, uTime * 0.05, 0.0)),
          fbm(p + vec3(5.2, 1.3, 2.8) + uTime * 0.05),
          fbm(p + vec3(2.2, 8.4, 0.5) - uTime * 0.02)
        );
        float density = fbm(p + 2.0 * q);
        float t = (density + 0.4) * 0.8;
        float alpha = smoothstep(uThreshold, 0.7, t);
        vec3 cWhite = vec3(1.0, 1.0, 1.0);
        vec3 color = mix(uColorDeep, uColorMid, smoothstep(uThreshold, 0.5, t));
        color = mix(color, uColorBright, smoothstep(0.5, 0.8, t));
        color = mix(color, cWhite, smoothstep(0.8, 1.0, t));
        float facing = dot(normalize(vNormal), normalize(vViewPosition));
        float depthFactor = (facing + 1.0) * 0.5;
        float finalAlpha = alpha * (0.02 + 0.98 * depthFactor);
        gl_FragColor = vec4(color * uBrightness, finalAlpha);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    depthWrite: false
  });

  const plasmaMesh = new THREE.Mesh(plasmaGeo, plasmaMat);
  mainGroup.add(plasmaMesh);

  // --- PARTICLES ---
  const pCount = 600;
  const pPos = new Float32Array(pCount * 3);
  const pSizes = new Float32Array(pCount);
  const sphereRadius = 0.95;

  for (let i = 0; i < pCount; i++) {
    const r = sphereRadius * Math.cbrt(Math.random());
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    pPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    pPos[i * 3 + 2] = r * Math.cos(phi);
    pSizes[i] = Math.random();
  }

  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  pGeo.setAttribute('aSize', new THREE.BufferAttribute(pSizes, 1));

  const pMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uColor: { value: new THREE.Color(0x00f0ff) }
    },
    vertexShader: `
      uniform float uTime;
      attribute float aSize;
      varying float vAlpha;
      void main() {
        vec3 pos = position;
        pos.y += sin(uTime * 0.2 + pos.x) * 0.02;
        pos.x += cos(uTime * 0.15 + pos.z) * 0.02;
        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        gl_Position = projectionMatrix * mvPosition;
        float baseSize = 8.0 * aSize + 4.0;
        gl_PointSize = baseSize * (1.0 / -mvPosition.z);
        vAlpha = 0.8 + 0.2 * sin(uTime + aSize * 10.0);
      }
    `,
    fragmentShader: `
      uniform vec3 uColor;
      varying float vAlpha;
      void main() {
        vec2 uv = gl_PointCoord - vec2(0.5);
        float dist = length(uv);
        if (dist > 0.5) discard;
        float glow = 1.0 - (dist * 2.0);
        glow = pow(glow, 1.8);
        gl_FragColor = vec4(uColor, glow * vAlpha);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  const particles = new THREE.Points(pGeo, pMat);
  mainGroup.add(particles);

  // Animation Loop
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    plasmaMat.uniforms.uTime.value = t * 1.2;
    pMat.uniforms.uTime.value = t;

    plasmaMesh.rotation.y = t * 0.08;
    mainGroup.rotation.y += 0.003;

    controls.update();
    renderer.render(scene, camera);
  }

  // Resize
  const ro = new ResizeObserver(() => {
    const w = container.clientWidth;
    const h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
  ro.observe(container);

  animate();
})();
</script>
