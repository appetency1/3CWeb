<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clothes. 管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0c0b;
      --surface: rgba(255, 255, 255, 0.03);
      --surface-warm: rgba(255, 255, 255, 0.05);
      --surface-hover: rgba(255, 255, 255, 0.08);
      --text: #f5f2ed;
      --text-secondary: rgba(245, 242, 237, 0.55);
      --text-muted: rgba(245, 242, 237, 0.32);
      --accent: #c45c4a;
      --accent-hover: #e07a68;
      --accent-light: rgba(196, 92, 74, 0.18);
      --gold: #c9a227;
      --green: #7cb69d;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.16);
      --shadow-soft: 0 4px 24px rgba(0,0,0,0.25);
      --shadow-medium: 0 12px 48px rgba(0,0,0,0.35);
      --shadow-large: 0 32px 96px rgba(0,0,0,0.45);
      --radius: 24px;
      --radius-sm: 16px;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Ambient ===== */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .ambient__grain {
      position: absolute;
      inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.35;
    }

    .orb--1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(196,92,74,0.5) 0%, transparent 70%);
      top: -160px; right: -120px;
    }

    .orb--2 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(201,162,39,0.28) 0%, transparent 70%);
      bottom: -140px; left: 15%;
    }

    /* ===== Layout ===== */
    .app {
      display: flex;
      width: 100%;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      width: 240px;
      background: rgba(255, 255, 255, 0.025);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      padding: 36px 0 24px;
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 100;
    }

    .brand {
      padding: 0 32px;
      margin-bottom: 48px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
      opacity: 0;
      animation: fadeIn 0.8s var(--ease-out) forwards;
    }

    .brand span { color: var(--accent); }

    .nav {
      flex: 1;
      padding: 0 20px;
    }

    .nav__item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      margin-bottom: 6px;
      border-radius: 12px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.25s var(--ease-out);
      opacity: 0;
      transform: translateX(-12px);
      animation: slideIn 0.6s var(--ease-out) forwards;
    }

    .nav__item:nth-child(1) { animation-delay: 0.05s; }
    .nav__item:nth-child(2) { animation-delay: 0.1s; }
    .nav__item:nth-child(3) { animation-delay: 0.15s; }
    .nav__item:nth-child(4) { animation-delay: 0.2s; }
    .nav__item:nth-child(5) { animation-delay: 0.25s; }
    .nav__item:nth-child(6) { animation-delay: 0.3s; }

    .nav__item:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .nav__item.active {
      background: var(--accent-light);
      color: var(--accent);
    }

    .nav__item svg {
      width: 18px;
      height: 18px;
      stroke-width: 1.8;
      flex-shrink: 0;
    }

    .user {
      margin: 0 24px;
      padding: 18px;
      border-radius: var(--radius-sm);
      background: var(--surface-warm);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      animation: fadeIn 0.8s var(--ease-out) 0.4s forwards;
    }

    .user__avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
    }

    .user__info { flex: 1; min-width: 0; }
    .user__name { font-size: 13px; font-weight: 600; color: var(--text); }
    .user__role { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* ===== Main ===== */
    .main {
      flex: 1;
      margin-left: 240px;
      padding: 36px 40px 48px;
      min-height: 100vh;
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeIn 0.8s var(--ease-out) 0.1s forwards;
    }

    .breadcrumb {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .breadcrumb strong {
      color: var(--text);
      font-weight: 500;
    }

    .header__actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s var(--ease-out);
      position: relative;
    }

    .icon-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
      box-shadow: var(--shadow-soft);
      transform: translateY(-1px);
    }

    .icon-btn svg { width: 18px; height: 18px; stroke-width: 1.8; }

    .icon-btn .dot {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--surface);
    }

    /* ===== Page Title ===== */
    .page-title {
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(16px);
      animation: rise 0.8s var(--ease-out) 0.15s forwards;
    }

    .page-title h1 {
      font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
      font-size: 42px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .page-title p {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* ===== Stats ===== */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      margin-bottom: 32px;
    }

    .stat-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: all 0.35s var(--ease-out);
      opacity: 0;
      transform: translateY(20px);
      animation: rise 0.7s var(--ease-out) forwards;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent 40%, transparent 60%, rgba(196,92,74,0.22));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .stat-card:nth-child(1) { animation-delay: 0.2s; }
    .stat-card:nth-child(2) { animation-delay: 0.28s; }
    .stat-card:nth-child(3) { animation-delay: 0.36s; }
    .stat-card:nth-child(4) { animation-delay: 0.44s; }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-medium);
      border-color: var(--border-hover);
    }

    .stat-card__label {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 14px;
      font-weight: 500;
    }

    .stat-card__value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 34px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 14px;
      letter-spacing: -1px;
    }

    .stat-card__trend {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 9px;
      border-radius: 20px;
    }

    .stat-card__trend.up {
      color: var(--green);
      background: rgba(124, 182, 157, 0.12);
    }

    .stat-card__trend.down {
      color: var(--accent);
      background: var(--accent-light);
    }

    .stat-card__trend svg { width: 12px; height: 12px; }

    /* ===== Charts ===== */
    .charts {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
    }

    .chart-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      opacity: 0;
      transform: translateY(20px);
      animation: rise 0.8s var(--ease-out) forwards;
    }

    .chart-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent 40%, transparent 60%, rgba(196,92,74,0.22));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .chart-card:nth-child(1) { animation-delay: 0.5s; }
    .chart-card:nth-child(2) { animation-delay: 0.6s; }

    .chart-card__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .chart-card__title {
      font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
      font-size: 24px;
      font-weight: 600;
    }

    .chart-card__subtitle {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    /* Bar Chart */
    .bar-chart {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      height: 220px;
      padding-top: 20px;
    }

    .bar-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .bar {
      width: 42px;
      background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.18) 100%);
      border-radius: 6px 6px 0 0;
      position: relative;
      transition: all 0.5s var(--ease-out);
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255,255,255,0.04);
    }

    .bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--accent);
      border-radius: 6px 6px 0 0;
      opacity: 1;
      box-shadow: 0 0 12px rgba(196,92,74,0.35);
    }

    .bar:hover {
      background: linear-gradient(180deg, rgba(196,92,74,0.35) 0%, rgba(196,92,74,0.15) 100%);
      transform: scaleX(1.08);
    }

    .bar__label {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Donut Chart */
    .donut-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .donut-chart {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: conic-gradient(
        var(--accent) 0deg 126deg,
        var(--gold) 126deg 216deg,
        var(--green) 216deg 288deg,
        rgba(255,255,255,0.18) 288deg 360deg
      );
      position: relative;
      margin-bottom: 28px;
      animation: rotateIn 1s var(--ease-out) 0.8s both;
    }

    .donut-chart::after {
      content: '';
      position: absolute;
      inset: 54px;
      border-radius: 50%;
      background: var(--bg);
      box-shadow: inset 0 0 0 1px var(--border);
    }

    .donut-legend {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }

    .legend-item__left { display: flex; align-items: center; gap: 10px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .legend-item__name { color: var(--text-secondary); }
    .legend-item__value { font-weight: 600; color: var(--text); }

    /* ===== Animations ===== */
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes rise { to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }
    @keyframes rotateIn {
      from { transform: rotate(-90deg) scale(0.85); opacity: 0; }
      to { transform: rotate(0) scale(1); opacity: 1; }
    }

    /* ===== Responsive ===== */
    @media (max-width: 1200px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .charts { grid-template-columns: 1fr; }
    }

    @media (max-width: 900px) {
      .sidebar { transform: translateX(-100%); }
      .main { margin-left: 0; padding: 24px; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="ambient">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="ambient__grain"></div>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">Clothes<span>.</span></div>

    <nav class="nav">
      <a href="#" class="nav__item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        数据概览
      </a>
      <a href="#" class="nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        商品管理
      </a>
      <a href="#" class="nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        订单管理
      </a>
      <a href="#" class="nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        用户管理
      </a>
      <a href="#" class="nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        分类管理
      </a>
      <a href="#" class="nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        轮播图管理
      </a>
    </nav>

    <div class="user">
      <div class="user__avatar">A</div>
      <div class="user__info">
        <div class="user__name">Admin</div>
        <div class="user__role">超级管理员</div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="header">
      <div class="breadcrumb">管理后台 / <strong>数据概览</strong></div>
      <div class="header__actions">
        <button class="icon-btn" aria-label="搜索">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="icon-btn" aria-label="通知">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="dot"></span>
        </button>
        <button class="icon-btn" aria-label="退出">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </header>

    <div class="page-title">
      <h1>数据概览</h1>
      <p>2026年6月19日，欢迎回来</p>
    </div>

    <section class="stats">
      <div class="stat-card">
        <div class="stat-card__label">今日营收</div>
        <div class="stat-card__value">¥0</div>
        <div class="stat-card__trend up">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          +12.5% 较昨日
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-card__label">订单数量</div>
        <div class="stat-card__value">2</div>
        <div class="stat-card__trend up">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          +8.2% 较昨日
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-card__label">新增用户</div>
        <div class="stat-card__value">3</div>
        <div class="stat-card__trend down">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>
          -2.1% 较昨日
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-card__label">商品总数</div>
        <div class="stat-card__value">64</div>
        <div class="stat-card__trend up">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          +3 件上新
        </div>
      </div>
    </section>

    <section class="charts">
      <div class="chart-card">
        <div class="chart-card__header">
          <div class="chart-card__title">销售趋势</div>
          <div class="chart-card__subtitle">最近 7 天</div>
        </div>
        <div class="bar-chart" id="barChart"></div>
      </div>

      <div class="chart-card">
        <div class="chart-card__header">
          <div class="chart-card__title">分类占比</div>
        </div>
        <div class="donut-wrap">
          <div class="donut-chart"></div>
          <div class="donut-legend">
            <div class="legend-item">
              <div class="legend-item__left">
                <span class="legend-dot" style="background: var(--accent);"></span>
                <span class="legend-item__name">上装</span>
              </div>
              <span class="legend-item__value">35%</span>
            </div>
            <div class="legend-item">
              <div class="legend-item__left">
                <span class="legend-dot" style="background: var(--gold);"></span>
                <span class="legend-item__name">裙装</span>
              </div>
              <span class="legend-item__value">25%</span>
            </div>
            <div class="legend-item">
              <div class="legend-item__left">
                <span class="legend-dot" style="background: var(--green);"></span>
                <span class="legend-item__name">裤装</span>
              </div>
              <span class="legend-item__value">20%</span>
            </div>
            <div class="legend-item">
              <div class="legend-item__left">
                <span class="legend-dot" style="background: rgba(255,255,255,0.18);"></span>
                <span class="legend-item__name">配饰</span>
              </div>
              <span class="legend-item__value">20%</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
  // 动态生成柱状图
  const barData = [
    { label: '周一', value: 45 },
    { label: '周二', value: 62 },
    { label: '周三', value: 38 },
    { label: '周四', value: 71 },
    { label: '周五', value: 84 },
    { label: '周六', value: 96 },
    { label: '周日', value: 88 }
  ];

  const barChart = document.getElementById('barChart');
  barData.forEach((item, index) => {
    const group = document.createElement('div');
    group.className = 'bar-group';
    group.innerHTML = `
      <div class="bar" style="height: 0%;" data-height="${item.value}%"></div>
      <div class="bar__label">${item.label}</div>
    `;
    barChart.appendChild(group);

    setTimeout(() => {
      group.querySelector('.bar').style.height = item.value + '%';
    }, 600 + index * 80);
  });

  // 简单数字增长动画
  const animateValue = (element, start, end, duration, prefix = '') => {
    const range = end - start;
    const startTime = performance.now();
    const step = (now) => {
      const progress = Math.min((now - startTime) / duration, 1);
      const value = Math.floor(start + range * progress);
      element.textContent = prefix + value;
      if (progress < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  };

  document.querySelectorAll('.stat-card__value').forEach((el, i) => {
    const text = el.textContent;
    const prefix = text.includes('¥') ? '¥' : '';
    const num = parseInt(text.replace(/[^0-9]/g, ''), 10) || 0;
    setTimeout(() => animateValue(el, 0, num, 1200, prefix), 300 + i * 120);
  });
</script>

</body>
