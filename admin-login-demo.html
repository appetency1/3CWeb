<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — 管理后台登录</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
/* ===== 核心变量 ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #050508;
  --bg-elevated: #0a0a12;
  --bg-card: rgba(255,255,255,0.02);
  --bg-glass: rgba(10,10,18,0.65);
  --neon-blue: #00f0ff;
  --neon-blue-glow: rgba(0,240,255,0.4);
  --neon-violet: #b829f7;
  --neon-violet-glow: rgba(184,41,247,0.35);
  --neon-pink: #ff2a8a;
  --neon-pink-glow: rgba(255,42,138,0.35);
  --neon-green: #00ffa3;
  --text: #e8e8f0;
  --text2: #8a8aa8;
  --text3: #5a5a78;
  --border: rgba(0,240,255,0.08);
  --border-hover: rgba(0,240,255,0.25);
  --font-display: 'Orbitron', 'Rajdhani', sans-serif;
  --font-body: 'Noto Sans SC', sans-serif;
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  min-height: 100vh;
}

/* 扫描线 */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,240,255,0.012) 2px, rgba(0,240,255,0.012) 4px);
}

/* ===== 全屏 3D 背景 ===== */
#geo-canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* ===== 页面布局 ===== */
.page {
  position: relative;
  z-index: 1;
  width: 100%; height: 100vh;
  display: flex;
}

/* ===== 左侧品牌区 ===== */
.hero-side {
  width: 55%; height: 100%;
  position: relative;
  display: flex; flex-direction: column;
  justify-content: space-between;
  align-items: flex-start;
  padding: 60px;
  overflow: hidden;
}

/* 左侧文字层叠在 3D 效果之上 */
.hero-brand, .hero-middle, .hero-content {
  position: relative;
  z-index: 2;
}

.hero-brand {
  display: flex; align-items: center; gap: 14px;
}
.hero-brand .mark {
  width: 44px; height: 44px; border-radius: 14px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 800; font-size: 22px; color: #000;
  box-shadow: 0 0 28px var(--neon-blue-glow), inset 0 1px 0 rgba(255,255,255,0.3);
}
.hero-brand .name {
  font-family: var(--font-display); font-size: 28px; font-weight: 700;
  letter-spacing: 5px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero-brand .tag {
  font-family: var(--font-display); font-size: 10px; font-weight: 600;
  letter-spacing: 3px; color: var(--text3);
  text-transform: uppercase; margin-top: 4px;
}

/* 中间留白区，给 3D 模型展示空间 */
.hero-middle {
  flex: 1;
  width: 100%;
  min-height: 120px;
}

.hero-content {
  max-width: 420px;
}
.hero-title {
  font-size: 42px; font-weight: 700; line-height: 1.15;
  margin-bottom: 14px;
  font-family: var(--font-display);
  letter-spacing: 1px;
}
.hero-title .gradient {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet), var(--neon-pink));
  background-size: 300% 300%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: gradient-flow 6s ease infinite;
}
@keyframes gradient-flow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.hero-desc {
  font-size: 14px; color: var(--text2); line-height: 1.8;
}

/* ===== 右侧表单区 ===== */
.form-side {
  width: 45%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  padding: 48px;
  position: relative;
}

.login-card {
  position: relative; z-index: 2;
  width: 100%; max-width: 400px;
  background: linear-gradient(180deg, rgba(14,14,24,0.88), rgba(8,8,14,0.95));
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 44px 36px 36px;
  backdrop-filter: blur(32px) saturate(1.2);
  box-shadow: 0 32px 96px rgba(0,0,0,0.5), 0 0 60px rgba(0,240,255,0.04), inset 0 1px 0 rgba(255,255,255,0.04);
}
/* 顶部光条 */
.login-card::before {
  content: ''; position: absolute; top: 0; left: 36px; right: 36px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-violet), transparent);
  opacity: 0.6;
}

.card-header {
  margin-bottom: 32px;
}
.card-header h2 {
  font-family: var(--font-display); font-size: 22px; font-weight: 700;
  letter-spacing: 2px; margin-bottom: 6px;
}
.card-header p {
  font-size: 13px; color: var(--text3);
}

.field { position: relative; margin-bottom: 18px; }
.field-input {
  width: 100%; height: 54px;
  padding: 20px 46px 8px 16px;
  background: rgba(255,255,255,0.03);
  border: 1.5px solid rgba(0,240,255,0.1);
  border-radius: 14px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  outline: none;
  transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  box-sizing: border-box;
}
.field-input:hover { border-color: rgba(0,240,255,0.18); }
.field-input:focus {
  border-color: var(--neon-blue);
  background: rgba(0,240,255,0.02);
  box-shadow: 0 0 0 4px rgba(0,240,255,0.06), 0 0 24px rgba(0,240,255,0.08);
}
.field-label {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  font-size: 14px; color: var(--text3);
  pointer-events: none;
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  transform-origin: left top;
}
.field-input:focus + .field-label,
.field-input:not(:placeholder-shown) + .field-label {
  top: 10px;
  transform: translateY(0) scale(0.72);
  color: var(--neon-blue);
  font-weight: 600;
}
.field-icon {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--text3);
  cursor: pointer;
  padding: 4px;
  display: flex;
  transition: color 0.3s, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.field-icon:hover { color: var(--neon-blue); transform: translateY(-50%) scale(1.1); }

.btn {
  width: 100%; height: 52px;
  border: none; border-radius: 16px;
  font-family: var(--font-body); font-size: 14px; font-weight: 700;
  letter-spacing: 2px; cursor: pointer;
  position: relative; overflow: hidden;
  transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  color: #000;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet));
  box-shadow: 0 8px 32px rgba(0,240,255,0.2);
  margin-top: 8px;
}
.btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transform: translateX(-100%);
  transition: transform 0.6s;
}
.btn:hover::before { transform: translateX(100%); }
.btn:hover {
  box-shadow: 0 14px 48px rgba(0,240,255,0.35), 0 0 20px rgba(184,41,247,0.15);
  transform: translateY(-2px);
}

.card-footer {
  margin-top: 24px;
  text-align: center;
  font-size: 11px; color: var(--text3);
  font-family: var(--font-display);
  letter-spacing: 2px; text-transform: uppercase;
}

/* ===== 响应式 ===== */
@media (max-width: 960px) {
  .hero-side { display: none; }
  .form-side { width: 100%; padding: 32px; }
}
@media (max-width: 480px) {
  .login-card { padding: 36px 24px 30px; border-radius: 24px; }
}
</style>
</head>
<body>

<!-- 全屏 3D 背景 -->
<canvas id="geo-canvas"></canvas>

<div class="page">
  <!-- 左侧品牌区 -->
  <div class="hero-side">
    <div class="hero-brand">
      <div class="mark">N</div>
      <div>
        <div class="name">NEXUS</div>
        <div class="tag">ADMIN PORTAL v4</div>
      </div>
    </div>

    <!-- 中间留白，3D 模型在此展示 -->
    <div class="hero-middle"></div>

    <div class="hero-content">
      <h1 class="hero-title">管理后台<br><span class="gradient">安全登录</span></h1>
      <p class="hero-desc">NEXUS 数码科幻商城管理中心。从商品上架到订单履约，从用户洞察到数据决策，一切尽在掌控。</p>
    </div>
  </div>

  <!-- 右侧表单区 -->
  <div class="form-side">
    <div class="login-card">
      <div class="card-header">
        <h2>欢迎回来</h2>
        <p>请输入管理员账号和密码</p>
      </div>

      <form id="formLogin">
        <div class="field">
          <input type="text" class="field-input" placeholder=" " autocomplete="username" value="admin" />
          <label class="field-label">账号</label>
        </div>
        <div class="field">
          <input type="password" class="field-input" placeholder=" " autocomplete="current-password" id="loginPwd" value="123456" />
          <label class="field-label">密码</label>
          <button type="button" class="field-icon" onclick="togglePwd('loginPwd',this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <button type="button" class="btn" onclick="alert('登录演示')">登 录</button>
      </form>

      <div class="card-footer">NEXUS ADMIN v4.0</div>
    </div>
  </div>
</div>

<script type="module">
/* ===== 密码可见切换 ===== */
window.togglePwd = function togglePwd(id, btn) {
  const input = document.getElementById(id);
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  btn.innerHTML = isText
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
}

/* ===== Three.js 3D 几何光环（全局背景） ===== */
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

(function initGeoAura() {
  const canvas = document.getElementById('geo-canvas');
  if (!canvas) return;

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x050508, 0.008);

  const width = window.innerWidth;
  const height = window.innerHeight;

  const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
  camera.position.set(3, 2, 5);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ReinhardToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.setClearColor(0x000000, 0);

  const renderScene = new RenderPass(scene, camera);
  const bloomPass = new UnrealBloomPass(new THREE.Vector2(width, height), 1.2, 0.3, 0.85);
  bloomPass.threshold = 0.1;
  bloomPass.strength = 0.8;
  bloomPass.radius = 0.5;

  const effectComposer = new EffectComposer(renderer);
  effectComposer.addPass(renderScene);
  effectComposer.addPass(bloomPass);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 1.2;
  controls.enableZoom = false;
  controls.enablePan = false;
  controls.enableRotate = false;
  controls.target.set(0, 0, 0);

  const ambientLight = new THREE.AmbientLight(0x222222);
  scene.add(ambientLight);
  const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
  mainLight.position.set(2, 3, 4);
  scene.add(mainLight);
  const backLight = new THREE.PointLight(0x4466cc, 0.6);
  backLight.position.set(-2, 1, -3);
  scene.add(backLight);
  const fillLight = new THREE.PointLight(0xffaa66, 0.5);
  fillLight.position.set(1.5, 1, 2);
  scene.add(fillLight);
  const colorLight = new THREE.PointLight(0xffaa44, 0.8);
  colorLight.position.set(1, 1, 2);
  scene.add(colorLight);

  /* 核心几何体组：放到左侧中心（NEXUS 和标题之间） */
  const auraGroup = new THREE.Group();
  auraGroup.position.set(-1.6, 0.6, 0);
  auraGroup.scale.setScalar(0.55);
  scene.add(auraGroup);

  const starGeometry = new THREE.BufferGeometry();
  const starCount = 800;
  const starPositions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    starPositions[i * 3] = 200 * (Math.random() - 0.5);
    starPositions[i * 3 + 1] = 100 * (Math.random() - 0.5);
    starPositions[i * 3 + 2] = 80 * (Math.random() - 0.5) - 40;
  }
  starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  const starMaterial = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.08, transparent: true, opacity: 0.6 });
  const stars = new THREE.Points(starGeometry, starMaterial);
  scene.add(stars);

  const geometryIco = new THREE.IcosahedronGeometry(1.1, 0);
  const materialMain = new THREE.MeshStandardMaterial({ color: 0x4a7c4c, emissive: 0x112233, roughness: 0.28, metalness: 0.75, flatShading: false, transparent: true, opacity: 0.92 });
  const coreMesh = new THREE.Mesh(geometryIco, materialMain);
  auraGroup.add(coreMesh);

  const wireframeMat = new THREE.MeshBasicMaterial({ color: 0x66ccff, wireframe: true, transparent: true, opacity: 0.25 });
  const wireframeIco = new THREE.Mesh(geometryIco, wireframeMat);
  wireframeIco.scale.setScalar(1.08);
  auraGroup.add(wireframeIco);

  const ringParticleCount = 1200;
  const ringGeometry = new THREE.BufferGeometry();
  const ringPositions = new Float32Array(ringParticleCount * 3);
  const ringColors = new Float32Array(ringParticleCount * 3);
  for (let i = 0; i < ringParticleCount; i++) {
    const t = (i / ringParticleCount) * Math.PI * 2;
    const r = 1.55;
    ringPositions[i * 3] = Math.cos(t) * r;
    ringPositions[i * 3 + 1] = 0.35 * Math.sin(3 * t);
    ringPositions[i * 3 + 2] = Math.sin(t) * r;
    ringColors[i * 3] = 0.4 + 0.6 * Math.sin(t);
    ringColors[i * 3 + 1] = 0.3 + 0.7 * Math.cos(1.7 * t);
    ringColors[i * 3 + 2] = 0.8 + 0.2 * Math.sin(2.3 * t);
  }
  ringGeometry.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
  ringGeometry.setAttribute('color', new THREE.BufferAttribute(ringColors, 3));
  const ringMaterial = new THREE.PointsMaterial({ size: 0.05, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending });
  const ringParticles = new THREE.Points(ringGeometry, ringMaterial);
  auraGroup.add(ringParticles);

  const torusMat = new THREE.MeshStandardMaterial({ color: 0x88aadd, emissive: 0x225522, roughness: 0.3, metalness: 0.9 });
  const torusRing = new THREE.Mesh(new THREE.TorusGeometry(1.45, 0.045, 64, 500), torusMat);
  auraGroup.add(torusRing);

  const torusRing2 = new THREE.Mesh(new THREE.TorusGeometry(1.68, 0.03, 64, 500), torusMat.clone());
  torusRing2.material.color.setHex(0xffcc66);
  torusRing2.material.emissive.setHex(0x442200);
  torusRing2.material.roughness = 0.5;
  torusRing2.material.metalness = 0.7;
  auraGroup.add(torusRing2);

  const cloudParticleCount = 800;
  const cloudGeo = new THREE.BufferGeometry();
  const cloudPositions = new Float32Array(cloudParticleCount * 3);
  for (let i = 0; i < cloudParticleCount; i++) {
    cloudPositions[i * 3] = 5 * (Math.random() - 0.5);
    cloudPositions[i * 3 + 1] = 3 * (Math.random() - 0.5);
    cloudPositions[i * 3 + 2] = 4 * (Math.random() - 0.5) - 1;
  }
  cloudGeo.setAttribute('position', new THREE.BufferAttribute(cloudPositions, 3));
  const cloudMat = new THREE.PointsMaterial({ color: 0x77aaff, size: 0.025, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
  const cloudPoints = new THREE.Points(cloudGeo, cloudMat);
  auraGroup.add(cloudPoints);

  const gridHelper = new THREE.GridHelper(12, 24, 0x88aadd, 0x334466);
  gridHelper.position.y = -1.8;
  gridHelper.material.transparent = true;
  gridHelper.material.opacity = 0.2;
  auraGroup.add(gridHelper);

  let time = 0;
  function animate() {
    requestAnimationFrame(animate);
    time += 0.012;
    coreMesh.rotation.y = 0.25 * time;
    coreMesh.rotation.x = 0.2 * Math.sin(0.37 * time);
    coreMesh.rotation.z = 0.15 * Math.cos(0.23 * time);
    wireframeIco.rotation.copy(coreMesh.rotation);
    ringParticles.rotation.y = 0.35 * time;
    ringParticles.rotation.x = 0.2 * Math.sin(0.28 * time);
    torusRing.rotation.x = Math.PI / 2;
    torusRing.rotation.z = 0.5 * time;
    torusRing2.rotation.x = Math.PI / 2 + 0.3;
    torusRing2.rotation.z = 0.65 * time;
    const e = (0.2 * time) % (2 * Math.PI);
    colorLight.color.setHSL(0.55 + 0.1 * Math.sin(e), 1, 0.6);
    stars.rotation.y += 0.0005;
    stars.rotation.x += 0.0003;
    cloudPoints.rotation.y = 0.05 * time;
    cloudPoints.rotation.x = 0.1 * Math.sin(0.1 * time);
    controls.update();
    effectComposer.render();
  }
  animate();

  window.addEventListener('resize', () => {
    const w = window.innerWidth;
    const h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    effectComposer.setSize(w, h);
  });
})();
</script>

</body>
</html>
