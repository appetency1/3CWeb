<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClickSpark Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
    }

    /* 点击火花 canvas 层 */
    #spark-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    /* 页面内容 */
    .page {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
      padding: 20px;
      text-align: center;
    }

    .title {
      font-size: 3rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 12px;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #a0a0b8;
      margin-bottom: 40px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin-bottom: 30px;
    }

    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      color: #fff;
      user-select: none;
      outline: none;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
    }

    .btn:active {
      transform: translateY(0) scale(.98);
    }

    .btn-1 { background: #e94560; }
    .btn-2 { background: #0f3460; border: 1px solid #e94560; }
    .btn-3 { background: #533483; }
    .btn-4 { background: #16c79a; }

    .controls {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 20px 24px;
      max-width: 480px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #c0c0d0;
      font-size: .9rem;
    }

    .control-row label { min-width: 90px; text-align: left; }

    input[type="range"] {
      flex: 1;
      margin: 0 10px;
      accent-color: #e94560;
    }

    .value-tag {
      min-width: 40px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: #fff;
    }

    .color-input {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: transparent;
    }

    .hint {
      margin-top: 24px;
      font-size: .85rem;
      color: #8888a0;
    }
  </style>
</head>
<body>
  <!-- 火花 Canvas 层 -->
  <canvas id="spark-canvas"></canvas>

  <!-- 页面内容 -->
  <div class="page">
    <h1 class="title">ClickSpark</h1>
    <p class="subtitle">点击页面任意位置，或点击按钮，查看火花效果</p>

    <div class="buttons">
      <button class="btn btn-1">按钮 A</button>
      <button class="btn btn-2">按钮 B</button>
      <button class="btn btn-3">按钮 C</button>
      <button class="btn btn-4">按钮 D</button>
    </div>

    <div class="controls">
      <div class="control-row">
        <label>颜色</label>
        <input type="color" class="color-input" id="spark-color" value="#e94560">
        <span class="value-tag" id="color-value">#e94560</span>
      </div>
      <div class="control-row">
        <label>数量</label>
        <input type="range" id="spark-count" min="4" max="32" value="12">
        <span class="value-tag" id="count-value">12</span>
      </div>
      <div class="control-row">
        <label>半径</label>
        <input type="range" id="spark-radius" min="10" max="120" value="45">
        <span class="value-tag" id="radius-value">45</span>
      </div>
      <div class="control-row">
        <label>大小</label>
        <input type="range" id="spark-size" min="5" max="60" value="18">
        <span class="value-tag" id="size-value">18</span>
      </div>
      <div class="control-row">
        <label>时长</label>
        <input type="range" id="spark-duration" min="200" max="1500" step="50" value="600">
        <span class="value-tag" id="duration-value">600</span>
      </div>
    </div>

    <p class="hint">提示：在页面空白处点击也有效果，按钮点击火花会跟随按钮位置</p>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById('spark-canvas');
      const ctx = canvas.getContext('2d');
      let width, height;

      const resize = () => {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width * devicePixelRatio;
        canvas.height = height * devicePixelRatio;
        ctx.scale(devicePixelRatio, devicePixelRatio);
      };
      resize();
      window.addEventListener('resize', resize);

      // 配置
      const config = {
        sparkColor: '#e94560',
        sparkCount: 12,
        sparkRadius: 45,
        sparkSize: 18,
        duration: 600,
      };

      // 火花数组
      let sparks = [];
      let animId = null;

      function easeOut(t) {
        return t * (2 - t);
      }

      function draw() {
        ctx.clearRect(0, 0, width, height);
        const now = performance.now();
        sparks = sparks.filter(spark => {
          const elapsed = now - spark.startTime;
          if (elapsed >= config.duration) return false;

          const progress = elapsed / config.duration;
          const eased = easeOut(progress);
          const distance = eased * config.sparkRadius;
          const lineLength = config.sparkSize * (1 - eased);

          const x1 = spark.x + distance * Math.cos(spark.angle);
          const y1 = spark.y + distance * Math.sin(spark.angle);
          const x2 = spark.x + (distance + lineLength) * Math.cos(spark.angle);
          const y2 = spark.y + (distance + lineLength) * Math.sin(spark.angle);

          ctx.strokeStyle = config.sparkColor;
          ctx.lineWidth = 2;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();

          return true;
        });

        if (sparks.length > 0) {
          animId = requestAnimationFrame(draw);
        } else {
          animId = null;
        }
      }

      function triggerSparks(x, y) {
        const now = performance.now();
        for (let i = 0; i < config.sparkCount; i++) {
          sparks.push({
            x, y,
            angle: (2 * Math.PI * i) / config.sparkCount,
            startTime: now,
          });
        }
        if (!animId) {
          animId = requestAnimationFrame(draw);
        }
      }

      // 页面点击
      document.addEventListener('click', e => {
        triggerSparks(e.clientX, e.clientY);
      });

      // 按钮点击额外加一层效果（阻止冒泡，但已经由 document 监听，会触发两次）
      // 这里不阻止，让用户在按钮上看到更明显的叠加效果也可以
      // 如果想每个按钮单独触发，可以去掉 document 监听

      // 控件绑定
      const bind = (id, key) => {
        const el = document.getElementById(id);
        const val = document.getElementById(id.replace('spark-', '') + '-value');
        if (!el) return;
        el.addEventListener('input', () => {
          config[key] = el.type === 'number' || el.type === 'range' ? +el.value : el.value;
          if (val) val.textContent = el.value;
        });
      };

      bind('spark-color', 'sparkColor');
      bind('spark-count', 'sparkCount');
      bind('spark-radius', 'sparkRadius');
      bind('spark-size', 'sparkSize');
      bind('spark-duration', 'duration');
    })();
  </script>
</body>
</html>
