<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAISON — 登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0b0a;
      --surface: rgba(18, 17, 16, 0.82);
      --surface-solid: #151413;
      --border: rgba(255, 246, 235, 0.12);
      --border-hover: rgba(255, 246, 235, 0.22);
      --text: #fff6eb;
      --text-secondary: rgba(255, 246, 235, 0.62);
      --text-muted: rgba(255, 246, 235, 0.38);
      --accent: #c9a066;
      --accent-hover: #dbb47a;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Inter', -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .stage {
      position: relative;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    /* 全屏背景 */
    .backdrop {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .backdrop__img {
      position: absolute;
      inset: -30px;
      background: url('https://images.unsplash.com/photo-1558171813-4c088753af8f?q=80&w=2835&auto=format&fit=crop') center/cover no-repeat;
      filter: blur(12px) brightness(0.55);
      transform: scale(1.1);
      animation: focusIn 1.6s var(--ease-out) 0.3s forwards;
    }

    @keyframes focusIn {
      to { filter: blur(0) brightness(0.72); transform: scale(1); }
    }

    .backdrop__vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 40%, transparent 0%, rgba(12,11,10,0.55) 70%, rgba(12,11,10,0.92) 100%);
    }

    .backdrop__grain {
      position: absolute;
      inset: 0;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
      pointer-events: none;
    }

    /* 顶部品牌 */
    .top-brand {
      position: absolute;
      top: 48px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      animation: fadeDown 1s var(--ease-out) 0.8s forwards;
    }

    .top-brand__mark {
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
    }

    .top-brand__name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 4px;
      color: var(--text);
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-16px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* 登录卡片 */
    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 52px 44px 44px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 40px 100px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,246,235,0.08);
      opacity: 0;
      transform: translateY(40px);
      animation: cardIn 1.1s var(--ease-out) 0.5s forwards;
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 28px;
      padding: 1px;
      background: linear-gradient(160deg, rgba(255,246,235,0.18), transparent 45%, transparent 65%, rgba(201,160,102,0.22));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .card__header {
      text-align: center;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeIn 0.9s var(--ease-out) 0.85s forwards;
    }

    .card__title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 500;
      line-height: 1.1;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .card__subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 300;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* 输入框 */
    .field {
      position: relative;
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.7s var(--ease-out) forwards;
    }

    .field:nth-child(1) { animation-delay: 1s; }
    .field:nth-child(2) { animation-delay: 1.1s; }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .field__input {
      width: 100%;
      height: 56px;
      padding: 20px 48px 8px 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color 0.35s var(--ease-out);
    }

    .field__input:hover { border-bottom-color: var(--border-hover); }
    .field__input:focus { border-bottom-color: var(--accent); }

    .field__label {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--text-muted);
      pointer-events: none;
      transition: all 0.3s var(--ease-out);
      transform-origin: left top;
      letter-spacing: 0.5px;
    }

    .field__input:focus + .field__label,
    .field__input:not(:placeholder-shown) + .field__label {
      top: 4px;
      transform: translateY(0) scale(0.75);
      color: var(--accent);
    }

    .field__line {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.4s var(--ease-out), left 0.4s var(--ease-out);
      pointer-events: none;
    }

    .field__input:focus ~ .field__line {
      width: 100%;
      left: 0;
    }

    .field__icon {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.3s;
    }

    .field__icon:hover { color: var(--text); }

    /* 选项 */
    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: -4px 0 32px;
      font-size: 13px;
      opacity: 0;
      animation: fadeIn 0.7s var(--ease-out) 1.2s forwards;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: color 0.3s;
    }

    .checkbox:hover { color: var(--text); }

    .checkbox input {
      appearance: none;
      width: 16px; height: 16px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: all 0.25s var(--ease-out);
    }

    .checkbox input:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox input:checked::after {
      content: '';
      position: absolute;
      left: 4px; top: 1px;
      width: 4px; height: 8px;
      border: solid var(--bg);
      border-width: 0 1.5px 1.5px 0;
      transform: rotate(45deg);
      animation: tick 0.25s var(--ease-spring);
    }

    @keyframes tick {
      0% { transform: rotate(45deg) scale(0); }
      70% { transform: rotate(45deg) scale(1.2); }
      100% { transform: rotate(45deg) scale(1); }
    }

    .link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      position: relative;
      transition: color 0.3s;
    }

    .link::after {
      content: '';
      position: absolute;
      left: 0; bottom: -2px;
      width: 0; height: 1px;
      background: var(--accent);
      transition: width 0.3s var(--ease-out);
    }

    .link:hover { color: var(--text); }
    .link:hover::after { width: 100%; }

    /* 按钮 */
    .btn {
      width: 100%;
      height: 54px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 2px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: transparent;
      color: var(--bg);
      opacity: 0;
      animation: fadeIn 0.7s var(--ease-out) 1.3s forwards;
      transition: transform 0.3s var(--ease-out), box-shadow 0.3s var(--ease-out);
    }

    .btn__bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      transition: transform 0.5s var(--ease-out);
      z-index: 0;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transform: translateX(-100%);
      transition: transform 0.7s var(--ease-out);
      z-index: 1;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(201,160,102,0.25);
    }

    .btn:hover .btn__bg { transform: scale(1.05); }
    .btn:hover::before { transform: translateX(100%); }

    .btn__text {
      position: relative;
      z-index: 2;
      transition: opacity 0.3s, transform 0.3s;
    }

    .btn.loading .btn__text {
      opacity: 0;
      transform: translateY(-6px);
    }

    .btn__spinner {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s var(--ease-spring);
      z-index: 2;
    }

    .btn.loading .btn__spinner {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(12,11,10,0.25);
      border-top-color: var(--bg);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn__ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: scale(0);
      animation: ripple 0.6s linear;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    /* 分隔 */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 28px 0;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      opacity: 0;
      animation: fadeIn 0.7s var(--ease-out) 1.4s forwards;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* 社交登录 */
    .social {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      opacity: 0;
      animation: fadeIn 0.7s var(--ease-out) 1.5s forwards;
    }

    .social__btn {
      height: 46px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.35s var(--ease-out);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .social__btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: rgba(255,246,235,0.04);
      transform: translateY(-2px);
    }

    .social__btn svg { width: 18px; height: 18px; }

    .card__footer {
      margin-top: 26px;
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
      opacity: 0;
      animation: fadeIn 0.7s var(--ease-out) 1.6s forwards;
    }

    /* 成功覆盖层 */
    .success {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s var(--ease-out);
    }

    .success.show {
      opacity: 1;
      pointer-events: auto;
    }

    .success__mark {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 1px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      position: relative;
    }

    .success__mark::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 50%;
      border: 1px solid transparent;
      border-top-color: var(--accent);
      animation: spin 1.5s linear infinite;
    }

    .success__mark svg {
      width: 28px; height: 28px;
      color: var(--accent);
      transform: scale(0);
    }

    .success.show .success__mark svg {
      animation: popIn 0.5s var(--ease-spring) 0.3s forwards;
    }

    @keyframes popIn {
      to { transform: scale(1); }
    }

    .success__text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      color: var(--text);
      letter-spacing: 1px;
    }

    /* 响应式 */
    @media (max-width: 520px) {
      .card { padding: 44px 28px 36px; border-radius: 22px; }
      .card__title { font-size: 34px; }
      .top-brand { top: 32px; }
    }
  </style>
</head>
<body>

<div class="stage">
  <div class="backdrop">
    <div class="backdrop__img"></div>
    <div class="backdrop__vignette"></div>
    <div class="backdrop__grain"></div>
  </div>

  <div class="top-brand">
    <div class="top-brand__mark">M</div>
    <div class="top-brand__name">MAISON</div>
  </div>

  <div class="card" id="card">
    <div class="card__header">
      <h1 class="card__title">Welcome back</h1>
      <p class="card__subtitle">登录以继续探索 MAISON</p>
    </div>

    <form id="loginForm" onsubmit="event.preventDefault()">
      <div class="field">
        <input type="text" class="field__input" id="username" placeholder=" " autocomplete="username" value="rafa">
        <label class="field__label" for="username">用户名 / 手机号</label>
        <div class="field__line"></div>
      </div>

      <div class="field">
        <input type="password" class="field__input" id="password" placeholder=" " autocomplete="current-password" value="123456">
        <label class="field__label" for="password">密码</label>
        <button type="button" class="field__icon" id="togglePwd">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
        <div class="field__line"></div>
      </div>

      <div class="options">
        <label class="checkbox">
          <input type="checkbox" checked>
          <span>记住我</span>
        </label>
        <a href="#" class="link">忘记密码？</a>
      </div>

      <button type="submit" class="btn" id="loginBtn">
        <span class="btn__bg"></span>
        <span class="btn__text">登 录</span>
        <span class="btn__spinner"><div class="spinner"></div></span>
      </button>
    </form>

    <div class="divider">或</div>

    <div class="social">
      <button class="social__btn">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 01.213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 00.167-.054l1.903-1.114a.864.864 0 01.717-.098 10.16 10.16 0 002.837.403c.276 0 .543-.027.811-.05a6.093 6.093 0 01-.305-1.855c0-3.564 3.348-6.456 7.473-6.456.26 0 .515.013.768.037C15.627 4.69 12.47 2.188 8.691 2.188z"/>
        </svg>
        微信
      </button>
      <button class="social__btn">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/>
        </svg>
        Google
      </button>
    </div>

    <div class="card__footer">
      还没有账户？<a href="#" class="link">立即注册</a>
    </div>
  </div>
</div>

<div class="success" id="success">
  <div class="success__mark">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <div class="success__text">欢迎回来</div>
</div>

<script>
  const form = document.getElementById('loginForm');
  const btn = document.getElementById('loginBtn');
  const pwdInput = document.getElementById('password');
  const togglePwd = document.getElementById('togglePwd');

  const eyeOpen = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const eyeClosed = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0
