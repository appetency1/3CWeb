<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clothes. 管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3f0ec;
      --surface: #ffffff;
      --surface-warm: #faf8f6;
      --text: #1a1816;
      --text-secondary: #706a64;
      --text-muted: #a9a39d;
      --accent: #b05c4f;
      --accent-hover: #954a3f;
      --accent-light: #fdf1ef;
      --gold: #c9a227;
      --border: #e6e1dc;
      --border-hover: #d3cdc6;
      --shadow-soft: 0 4px 24px rgba(26,24,22,0.04);
      --shadow-medium: 0 12px 48px rgba(26,24,22,0.07);
      --shadow-large: 0 32px 96px rgba(26,24,22,0.1);
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-magnetic: cubic-bezier(0.23, 1, 0.32, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Ambient Background ===== */
    .stage {
      position: relative;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .ambient {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .ambient__grain {
      position: absolute;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      mix-blend-mode: multiply;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.35;
      animation: drift 28s ease-in-out infinite alternate;
    }

    .orb--1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(176,92,79,0.28) 0%, transparent 70%);
      top: -140px; left: -100px;
      animation-duration: 32s;
    }

    .orb--2 {
      width: 440px; height: 440px;
      background: radial-gradient(circle, rgba(201,162,39,0.18) 0%, transparent 70%);
      bottom: -120px; right: -80px;
      animation-duration: 36s;
      animation-delay: -10s;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 30px) scale(1.1); }
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(26,24,22,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,24,22,0.03) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(circle at 50% 50%, black 0%, transparent 70%);
      opacity: 0;
      animation: fadeIn 1.4s var(--ease-out) 0.4s forwards;
    }

    /* ===== Main Layout ===== */
    .login-frame {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1120px;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 80px;
      align-items: center;
    }

    /* ===== Left Brand ===== */
    .brand {
      padding-right: 20px;
    }

    .brand__eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 100px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(20px);
      animation: rise 0.9s var(--ease-out) 0.1s forwards;
    }

    .brand__eyebrow::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulseDot 2s ease-in-out infinite;
    }

    @keyframes pulseDot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.7); opacity: 0.6; }
    }

    .brand__logo {
      font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
      font-size: 76px;
      font-weight: 600;
      letter-spacing: -2.5px;
      line-height: 1;
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(30px);
      animation: rise 1s var(--ease-out) 0.2s forwards;
    }

    .brand__logo span {
      color: var(--accent);
      display: inline-block;
      animation: accentPulse 3s ease-in-out infinite;
    }

    @keyframes accentPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.72; }
    }

    .brand__tagline {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 15px;
      color: var(--text-secondary);
      font-weight: 300;
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(20px);
      animation: rise 0.9s var(--ease-out) 0.35s forwards;
    }

    .brand__tagline::before {
      content: '';
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .brand__desc {
      max-width: 380px;
      font-size: 14px;
      line-height: 1.9;
      color: var(--text-muted);
      font-weight: 300;
      opacity: 0;
      transform: translateY(20px);
      animation: rise 0.9s var(--ease-out) 0.5s forwards;
    }

    .brand__meta {
      margin-top: 64px;
      display: flex;
      gap: 48px;
      opacity: 0;
      animation: fadeIn 1s var(--ease-out) 0.9s forwards;
    }

    .meta-item {
      position: relative;
      opacity: 0;
      transform: translateY(16px);
      animation: rise 0.7s var(--ease-out) forwards;
    }

    .meta-item:nth-child(1) { animation-delay: 0.95s; }
    .meta-item:nth-child(2) { animation-delay: 1.05s; }
    .meta-item:nth-child(3) { animation-delay: 1.15s; }

    .meta-item__num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }

    .meta-item__label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .meta-item::after {
      content: '';
      position: absolute;
      right: -24px;
      top: 8px;
      bottom: 8px;
      width: 1px;
      background: var(--border);
    }

    .meta-item:last-child::after { display: none; }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ===== Right Card ===== */
    .card-wrap {
      perspective: 1400px;
      opacity: 0;
      transform: translateY(30px);
      animation: rise 1s var(--ease-out) 0.3s forwards;
    }

    .login-card {
      position: relative;
      padding: 52px 44px 44px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow:
        var(--shadow-large),
        inset 0 1px 1px rgba(255,255,255,0.8);
      transform-style: preserve-3d;
      transition: transform 0.15s ease-out, box-shadow 0.5s var(--ease-out);
      will-change: transform;
    }

    .login-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 28px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.9), transparent 35%, transparent 65%, rgba(176,92,79,0.18));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .login-card:hover {
      box-shadow:
        0 40px 100px rgba(26,24,22,0.12),
        inset 0 1px 1px rgba(255,255,255,0.9);
    }

    .card__header {
      margin-bottom: 38px;
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.7s var(--ease-out) 0.55s forwards;
    }

    .card__title {
      font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .card__subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 300;
    }

    /* ===== Form Fields ===== */
    .field {
      position: relative;
      margin-bottom: 26px;
      opacity: 0;
      transform: translateY(14px);
      animation: rise 0.7s var(--ease-out) forwards;
    }

    .field:nth-child(1) { animation-delay: 0.65s; }
    .field:nth-child(2) { animation-delay: 0.75s; }

    .field__shell {
      position: relative;
      background: var(--surface-warm);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2px;
      transition: all 0.3s var(--ease-out);
    }

    .field__shell:focus-within {
      border-color: rgba(176,92,79,0.35);
      box-shadow: 0 0 0 4px rgba(176,92,79,0.06);
      background: var(--surface);
    }

    .field__input {
      width: 100%;
      height: 56px;
      padding: 20px 48px 6px 16px;
      background: transparent;
      border: none;
      border-radius: 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      outline: none;
    }

    .field__label {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      color: var(--text-muted);
      pointer-events: none;
      transition: all 0.25s var(--ease-out);
      transform-origin: left top;
    }

    .field__input:focus + .field__label,
    .field__input:not(:placeholder-shown) + .field__label {
      top: 11px;
      transform: translateY(0) scale(0.72);
      color: var(--accent);
    }

    .field__line {
      position: absolute;
      bottom: 2px;
      left: 50%;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
      transition: width 0.45s var(--ease-out), left 0.45s var(--ease-out);
      pointer-events: none;
    }

    .field__shell:focus-within .field__line {
      width: calc(100% - 4px);
      left: 2px;
    }

    .field__icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.25s var(--ease-out);
    }

    .field__icon:hover {
      color: var(--accent);
      background: var(--accent-light);
    }

    .field__icon svg {
      width: 18px;
      height: 18px;
      stroke-width: 1.8;
      transition: transform 0.2s var(--ease-spring);
    }

    .field__icon:active svg { transform: scale(0.85); }

    /* ===== Options ===== */
    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: -2px 0 30px;
      font-size: 13px;
      opacity: 0;
      animation: fadeIn 0.6s var(--ease-out) 0.85s forwards;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: color 0.3s;
    }

    .checkbox:hover { color: var(--text); }

    .checkbox input {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--border-hover);
      border-radius: 5px;
      background: var(--surface-warm);
      cursor: pointer;
      position: relative;
      transition: all 0.25s var(--ease-out);
      flex-shrink: 0;
    }

    .checkbox input:checked {
      background: var(--accent);
      border-color: var(--accent);
      transform: scale(1.05);
    }

    .checkbox input:checked::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 2px;
      width: 4px;
      height: 8px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      animation: tick 0.3s var(--ease-spring);
    }

    @keyframes tick {
      0% { transform: rotate(45deg) scale(0); }
      70% { transform: rotate(45deg) scale(1.2); }
      100% { transform: rotate(45deg) scale(1); }
    }

    .link {
      color: var(--text-secondary);
      text-decoration: none;
      position: relative;
      transition: color 0.3s;
    }

    .link::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.35s var(--ease-out);
    }

    .link:hover { color: var(--accent); }
    .link:hover::after { width: 100%; }

    /* ===== Login Button ===== */
    .btn-wrap {
      opacity: 0;
      animation: fadeIn 0.6s var(--ease-out) 0.95s forwards;
    }

    .btn {
      width: 100%;
      height: 54px;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.5px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: var(--accent);
      color: #fff;
      transition: transform 0.2s var(--ease-spring), box-shadow 0.4s var(--ease-out);
      box-shadow: 0 4px 16px rgba(176,92,79,0.28);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(176,92,79,0.38);
    }

    .btn:active { transform: translateY(0) scale(0.98); }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: left 0.6s var(--ease-out);
    }

    .btn:hover::before { left: 100%; }

    .btn__text {
      position: relative;
      z-index: 2;
      transition: opacity 0.3s, transform 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .btn.loading .btn__text {
      opacity: 0;
      transform: translateY(-6px);
    }

    .btn__spinner {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s var(--ease-spring);
      z-index: 2;
    }

    .btn.loading .btn__spinner {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .card__footer {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      opacity: 0;
      animation: fadeIn 0.6s var(--ease-out) 1.05s forwards;
    }

    /* ===== Success Overlay ===== */
    .success-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s var(--ease-out);
    }

    .success-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .success-ring {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      position: relative;
    }

    .success-ring::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
    }

    .success-ring svg {
      width: 32px;
      height: 32px;
      color: var(--accent);
      transform: scale(0);
      animation: popIn 0.5s var(--ease-spring) 0.3s forwards;
    }

    @keyframes popIn {
      to { transform: scale(1); }
    }

    .success-text {
      font-size: 17px;
      color: var(--text);
      letter-spacing: 0.5px;
    }

    /* ===== Responsive ===== */
    @media (max-width: 900px) {
      .login-frame {
        grid-template-columns: 1fr;
        gap: 40px;
        text-align: center;
      }
      .brand { padding-right: 0; }
      .brand__desc { margin: 0 auto; }
      .brand__meta { justify-content: center; }
      .brand__tagline { justify-content: center; }
      .brand__tagline::before { display: none; }
    }

    @media (max-width: 520px) {
      .stage { padding: 24px; }
      .brand__logo { font-size: 56px; }
      .login-card { padding: 40px 28px 32px; }
      .brand__meta { gap: 32px; }
      .meta-item::after { right: -16px; }
    }
  </style>
</head>
<body>

<div class="stage" id="stage">
  <div class="ambient">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="ambient__grain"></div>
    <div class="grid"></div>
  </div>

  <div class="login-frame">
    <div class="brand">
      <div class="brand__eyebrow">Clothes Admin</div>
      <h1 class="brand__logo">Clothes<span>.</span></h1>
      <div class="brand__tagline">管理后台 · 数据总览</div>
      <p class="brand__desc">
        为时尚零售场景打造的轻量管理中枢。从商品上架到订单履约，从用户洞察到数据决策，一切尽在掌控。
      </p>
      <div class="brand__meta">
        <div class="meta-item">
          <div class="meta-item__num">12.8k</div>
          <div class="meta-item__label">商品</div>
        </div>
        <div class="meta-item">
          <div class="meta-item__num">3.2k</div>
          <div class="meta-item__label">订单</div>
        </div>
        <div class="meta-item">
          <div class="meta-item__num">98%</div>
          <div class="meta-item__label">满意度</div>
        </div>
      </div>
    </div>

    <div class="card-wrap" id="cardWrap">
      <div class="login-card" id="loginCard">
        <div class="card__header">
          <div class="card__title">欢迎回来</div>
          <div class="card__subtitle">请输入管理员账号继续</div>
        </div>

        <form id="loginForm" autocomplete="off">
          <div class="field">
            <div class="field__shell">
              <input type="text" class="field__input" id="username" placeholder=" " autocomplete="username" value="admin">
              <label class="field__label" for="username">账号</label>
              <div class="field__line"></div>
            </div>
          </div>

          <div class="field">
            <div class="field__shell">
              <input type="password" class="field__input" id="password" placeholder=" " autocomplete="current-password" value="admin">
              <label class="field__label" for="password">密码</label>
              <button type="button" class="field__icon" id="togglePwd" aria-label="切换密码可见">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
              <div class="field__line"></div>
            </div>
          </div>

          <div class="options">
            <label class="checkbox">
              <input type="checkbox" checked>
              <span>记住我</span>
            </label>
            <a href="#" class="link">忘记密码？</a>
          </div>

          <div class="btn-wrap">
            <button type="submit" class="btn" id="loginBtn">
              <span class="btn__text">登 录</span>
              <span class="btn__spinner"><div class="spinner"></div></span>
            </button>
          </div>
        </form>

        <div class="card__footer">Clothes 管理后台 v2.0</div>
      </div>
    </div>
  </div>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-ring">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <div class="success-text">登录成功，正在进入管理后台…</div>
</div>

<script>
  const card = document.getElementById('loginCard');
  const wrap = document.getElementById('cardWrap');
  const form = document.getElementById('loginForm');
  const btn = document.getElementById('loginBtn');
  const pwdInput = document.getElementById('password');
  const togglePwd = document.getElementById('togglePwd');
  const successOverlay = document.getElementById('successOverlay');

  // 3D tilt following mouse
  document.addEventListener('mousemove', (e) => {
    if (window.innerWidth < 900) return;
    const rect = wrap.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = (e.clientX - cx) / (rect.width / 2);
    const dy = (e.clientY - cy) / (rect.height / 2);
    const rotateX = dy * -5;
    const rotateY = dx * 5;
    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  });

  document.addEventListener('mouseleave', () => {
    card.style.transform = '';
  });

  // Password visibility toggle
  const eyeOpen = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const eyeClosed = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

  togglePwd.addEventListener('click', () => {
    const isPwd = pwdInput.type === 'password';
    pwdInput.type = isPwd ? 'text' : 'password';
    togglePwd.innerHTML = isPwd ? eyeClosed : eyeOpen;
    togglePwd.style.transform = 'translateY(-50%) scale(0.9)';
    setTimeout(() => togglePwd.style.transform = 'translateY(-50%)', 150);
  });

  // Form submission
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    btn.classList.add('loading');
    btn.disabled = true;

    setTimeout(() => {
      successOverlay.classList.add('show');
    }, 1600);
  });
</script>

</body>
</html>
