<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码确认验证演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #6366f1;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 40px 32px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #6b7280;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-group .hint {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .form-group .hint span:first-child {
            font-size: 13px;
            font-weight: 500;
            color: #374151;
        }

        .form-group .hint span:last-child {
            font-size: 12px;
            color: #9ca3af;
        }

        .input-field {
            width: 100%;
            height: 52px;
            padding: 0 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            color: #1f2937;
            letter-spacing: 0.15em;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-field:focus {
            border-color: #374151;
        }

        .input-field:disabled {
            background: #f9fafb;
            cursor: not-allowed;
        }

        .input-field::placeholder {
            color: #9ca3af;
            letter-spacing: normal;
        }

        .preview-box {
            position: relative;
            height: 52px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            background: white;
            padding: 0 12px;
            margin-bottom: 8px;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .preview-box.success {
            border-color: #10b981;
        }

        .preview-box.shake {
            animation: shake 0.5s ease;
        }

        .preview-box.match {
            animation: matchPulse 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        @keyframes matchPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .preview-dots {
            position: relative;
            z-index: 2;
            display: flex;
            height: 100%;
            align-items: center;
        }

        .preview-dot-wrapper {
            width: 24px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #1f2937;
        }

        .preview-highlights {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
        }

        .preview-highlight {
            width: 24px;
            height: 100%;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .preview-highlight.active {
            opacity: 1;
        }

        .preview-highlight.match {
            background: rgba(16, 185, 129, 0.3);
        }

        .preview-highlight.mismatch {
            background: rgba(239, 68, 68, 0.3);
        }

        .success-message {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            background: #dcfce7;
            color: #166534;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .submit-btn {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .submit-btn:hover:not(:disabled) {
            opacity: 0.9;
        }

        .submit-btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .tips {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .tips p {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="header">
            <div class="icon">🔐</div>
            <h1>密码验证演示</h1>
            <p>输入密码并确认，体验实时验证效果</p>
        </div>

        <div class="form-group">
            <label>设置密码</label>
            <input 
                type="password" 
                class="input-field" 
                placeholder="请输入密码" 
                id="password"
                maxlength="12"
            />
        </div>

        <div class="form-group">
            <div class="hint">
                <span>→ 确认密码</span>
                <span id="passwordLength">(0/12)</span>
            </div>
            <div class="preview-box" id="previewBox">
                <div class="preview-highlights" id="previewHighlights"></div>
                <div class="preview-dots" id="previewDots"></div>
            </div>
            <input 
                type="password" 
                class="input-field" 
                placeholder="确认密码" 
                id="confirmPassword"
                maxlength="12"
                disabled
            />
        </div>

        <div id="successMessage" style="display: none;" class="success-message">
            <span>✅</span>
            <span>密码匹配成功！</span>
        </div>

        <button class="submit-btn" id="submitBtn" disabled>
            请输入匹配的密码
        </button>

        <div class="tips">
            <p>💡 提示：密码输入框会实时显示每个字符的匹配状态</p>
            <p>绿色表示匹配，红色表示不匹配</p>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const previewBox = document.getElementById('previewBox');
        const previewDots = document.getElementById('previewDots');
        const previewHighlights = document.getElementById('previewHighlights');
        const passwordLength = document.getElementById('passwordLength');
        const successMessage = document.getElementById('successMessage');
        const submitBtn = document.getElementById('submitBtn');

        let password = '';
        let confirmPassword = '';

        function updatePreview() {
            previewDots.innerHTML = '';
            previewHighlights.innerHTML = '';

            if (!password) {
                passwordLength.textContent = '(0/12)';
                return;
            }

            passwordLength.textContent = `(${password.length}/12)`;

            for (let i = 0; i < password.length; i++) {
                const dotWrapper = document.createElement('span');
                dotWrapper.className = 'preview-dot-wrapper';
                const dot = document.createElement('span');
                dot.className = 'preview-dot';
                dotWrapper.appendChild(dot);
                previewDots.appendChild(dotWrapper);

                const highlight = document.createElement('span');
                highlight.className = 'preview-highlight';
                if (confirmPassword[i]) {
                    highlight.classList.add('active');
                    if (confirmPassword[i] === password[i]) {
                        highlight.classList.add('match');
                    } else {
                        highlight.classList.add('mismatch');
                    }
                }
                previewHighlights.appendChild(highlight);
            }
        }

        function checkMatch() {
            const match = password && password === confirmPassword;
            
            previewBox.classList.toggle('success', match);
            
            if (match) {
                previewBox.classList.add('match');
                successMessage.style.display = 'flex';
                submitBtn.textContent = '确认完成';
                submitBtn.disabled = false;
                
                setTimeout(() => {
                    previewBox.classList.remove('match');
                }, 300);
                
                setTimeout(() => {
                    successMessage.style.display = 'none';
                }, 2000);
            } else {
                submitBtn.textContent = '请输入匹配的密码';
                submitBtn.disabled = true;
            }
        }

        passwordInput.addEventListener('input', (e) => {
            password = e.target.value;
            confirmPassword = '';
            confirmPasswordInput.value = '';
            successMessage.style.display = 'none';
            
            updatePreview();
            checkMatch();
        });

        confirmPasswordInput.addEventListener('input', (e) => {
            const newValue = e.target.value;
            
            if (confirmPassword.length >= password.length && newValue.length > confirmPassword.length) {
                previewBox.classList.add('shake');
                setTimeout(() => {
                    previewBox.classList.remove('shake');
                }, 500);
                e.target.value = confirmPassword;
                return;
            }
            
            confirmPassword = newValue;
            updatePreview();
            checkMatch();
        });

        passwordInput.addEventListener('keyup', () => {
            confirmPasswordInput.disabled = !password;
        });
    </script>
</body>
</html>
