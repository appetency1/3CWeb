<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品牌墙 — RAF 物理缓动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /*
         * 色彩策略：暖色中性 + 单一品牌强调色
         * 不用 #000/#fff，所有中性色都朝品牌暖红偏移
         */
        :root {
            --bg-page: #f2f0ec;
            --bg-surface: #fcfcfb;
            --border-subtle: #e8e6e2;
            --border-hover: #c9302c;
            --text-primary: #2c2a27;
            --text-secondary: #8a8680;
            --shadow-hover: rgba(44, 42, 39, 0.08);
            --easing-out-expo: cubic-bezier(0.22, 1, 0.36, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 64px 24px;
            color: var(--text-primary);
        }

        /* ===== 标题区 ===== */
        .header {
            width: 100%;
            max-width: 900px;
            margin-bottom: 32px;
        }

        .header-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--border-hover);
            margin-bottom: 8px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 6px;
            line-height: 1.6;
        }

        /* ===== 容器 ===== */
        .brand-wall {
            width: 100%;
            max-width: 900px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 28px 0;
            overflow: hidden;
            position: relative;
        }

        /* 边缘渐隐 — 与页面背景融合 */
        .brand-wall::before,
        .brand-wall::after {
            content: '';
            position: absolute;
            top: 0;
            width: 72px;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .brand-wall::before {
            left: 0;
            background: linear-gradient(to right, var(--bg-surface), transparent);
        }

        .brand-wall::after {
            right: 0;
            background: linear-gradient(to left, var(--bg-surface), transparent);
        }

        .brand-wall-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 28px;
            margin-bottom: 20px;
        }

        .brand-wall-header svg {
            width: 18px;
            height: 18px;
            color: var(--border-hover);
        }

        .brand-wall-header span {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        /* ===== 滚动轨道 ===== */
        .track-wrapper {
            width: 100%;
            overflow: hidden;
        }

        .track {
            display: flex;
            width: max-content;
            will-change: transform;
        }

        /* ===== 品牌卡片 ===== */
        .brand-card {
            flex-shrink: 0;
            width: 128px;
            height: 68px;
            margin: 0 8px;
            background: var(--bg-page);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;

            /* 动画只用 transform + opacity，不动 layout 属性 */
            transition:
                transform 0.4s var(--easing-out-expo),
                border-color 0.35s var(--easing-out-expo),
                box-shadow 0.35s var(--easing-out-expo),
                background 0.35s var(--easing-out-expo);
        }

        .brand-card:hover {
            transform: translateY(-3px) scale(1.04);
            border-color: var(--border-hover);
            background: var(--bg-surface);
            box-shadow: 0 12px 28px var(--shadow-hover);
        }

        .brand-card img {
            max-width: 92px;
            max-height: 40px;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            pointer-events: none;
            opacity: 0.85;
            transition: opacity 0.35s var(--easing-out-expo);
        }

        .brand-card:hover img {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-label">Infinite Scroll</div>
        <h1>合作品牌</h1>
        <p>requestAnimationFrame + 物理缓动 · ResizeObserver 自适应 · 悬停平滑减速</p>
    </div>

    <div class="brand-wall">
        <div class="brand-wall-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
            </svg>
            <span>热门品牌</span>
        </div>
        <div class="track-wrapper" id="wrapper">
            <div class="track" id="track"></div>
        </div>
    </div>

    <script>
        /**
         * LogoLoop — 纯 JS 实现
         * 核心：RAF + 物理缓动 + ResizeObserver + 图片加载等待
         */
        class LogoLoop {
            constructor(wrapper, track, brands, options, createItemFn) {
                this.wrapper = wrapper;
                this.track = track;
                this.brands = brands;
                this.createItemFn = createItemFn;

                this.options = {
                    speed: 0.6,
                    hoverSpeed: 0,
                    easingFactor: 0.1,
                    hoverEasing: 0.08,
                    pauseOnHover: true,
                    ...options
                };

                this.position = 0;
                this.velocity = 0;
                this.targetSpeed = this.options.speed;
                this.isHovered = false;
                this.rafId = null;
                this.singleGroupWidth = 0;
                this.originalCount = 0;

                this._onMouseEnter = this._onMouseEnter.bind(this);
                this._onMouseLeave = this._onMouseLeave.bind(this);

                this.init();
            }

            init() {
                this.generateContent();
                this.waitForImages().then(() => {
                    this.calculateGroupWidth();
                    this.adjustDuplication();
                    this.bindEvents();
                    this.start();
                });
            }

            generateContent() {
                this.brands.forEach(brand => this.track.appendChild(this.createItemFn(brand)));
                this.originalCount = this.track.children.length;
            }

            waitForImages() {
                const images = this.track.querySelectorAll('img');
                if (images.length === 0) return Promise.resolve();

                return Promise.all(
                    Array.from(images).map(img => {
                        if (img.complete) return Promise.resolve();
                        return new Promise(resolve => {
                            img.onload = resolve;
                            img.onerror = resolve;
                        });
                    })
                );
            }

            calculateGroupWidth() {
                const children = Array.from(this.track.children);
                if (!children.length || !this.originalCount) {
                    this.singleGroupWidth = 0;
                    return;
                }
                this.singleGroupWidth = children.slice(0, this.originalCount).reduce((sum, el) => {
                    const s = getComputedStyle(el);
                    return sum + el.offsetWidth + parseInt(s.marginLeft) + parseInt(s.marginRight);
                }, 0);
            }

            adjustDuplication() {
                if (!this.singleGroupWidth) return;
                const wrapperWidth = this.wrapper.offsetWidth;
                while (this.track.scrollWidth < wrapperWidth * 2) {
                    Array.from(this.track.children)
                        .slice(0, this.originalCount)
                        .forEach(child => this.track.appendChild(child.cloneNode(true)));
                }
            }

            bindEvents() {
                if (this.options.pauseOnHover) {
                    this.wrapper.addEventListener('mouseenter', this._onMouseEnter);
                    this.wrapper.addEventListener('mouseleave', this._onMouseLeave);
                }

                this.resizeObserver = new ResizeObserver(() => {
                    this.calculateGroupWidth();
                    this.adjustDuplication();
                });
                this.resizeObserver.observe(this.wrapper);

                // 尊重用户的减少动画偏好
                this.prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
                this.prefersReducedMotion.addEventListener?.('change', (e) => {
                    this.targetSpeed = e.matches ? 0 : this.options.speed;
                });
            }

            _onMouseEnter() {
                this.isHovered = true;
                this.targetSpeed = this.options.hoverSpeed;
            }

            _onMouseLeave() {
                this.isHovered = false;
                this.targetSpeed = this.prefersReducedMotion?.matches ? 0 : this.options.speed;
            }

            start() {
                this.rafId = requestAnimationFrame(() => this.animate());
            }

            animate() {
                const factor = this.isHovered ? this.options.hoverEasing : this.options.easingFactor;
                this.velocity += (this.targetSpeed - this.velocity) * factor;
                this.position -= this.velocity;

                if (this.singleGroupWidth && this.position <= -this.singleGroupWidth) {
                    this.position += this.singleGroupWidth;
                }

                this.track.style.transform = `translate3d(${this.position}px, 0, 0)`;
                this.rafId = requestAnimationFrame(() => this.animate());
            }

            destroy() {
                if (this.rafId) cancelAnimationFrame(this.rafId);
                if (this.resizeObserver) this.resizeObserver.disconnect();
                this.wrapper.removeEventListener('mouseenter', this._onMouseEnter);
                this.wrapper.removeEventListener('mouseleave', this._onMouseLeave);
            }
        }

        /* ===== 品牌数据 ===== */
        const brands = [
            { name: 'MLB', file: 'mlb' },
            { name: '回力', file: 'warrior' },
            { name: 'Uniqlo', file: 'uniqlo' },
            { name: '小CK', file: 'charleskeith' },
            { name: '飞跃', file: 'feiyue' },
            { name: 'Nike', file: 'nike' },
            { name: 'H&M', file: 'hm' },
            { name: 'UR', file: 'ur' },
            { name: '红豆', file: 'hongdou' },
            { name: '红蜻蜓', file: 'red-dragonfly' },
            { name: 'Supreme', file: 'supreme' },
            { name: 'Adidas', file: 'adidas' },
            { name: 'ZARA', file: 'zara' },
            { name: 'MUJI', file: 'muji' },
            { name: 'GAP', file: 'gap' },
            { name: 'GUCCI', file: 'gucci' },
            { name: 'PRADA', file: 'prada' },
            { name: 'DIOR', file: 'dior' },
            { name: 'LV', file: 'lv' },
            { name: 'CHANEL', file: 'chanel' },
        ];

        function createLogoImg(brand, maxW, maxH) {
            const img = document.createElement('img');
            img.alt = brand.name;
            img.style.maxWidth = maxW;
            img.style.maxHeight = maxH;
            img.style.width = 'auto';
            img.style.height = 'auto';
            img.style.objectFit = 'contain';
            img.src = `demo-logos/${brand.file}.png`;
            return img;
        }

        new LogoLoop(
            document.getElementById('wrapper'),
            document.getElementById('track'),
            brands,
            { speed: 0.6, hoverSpeed: 0, easingFactor: 0.1 },
            (brand) => {
                const el = document.createElement('div');
                el.className = 'brand-card';
                el.appendChild(createLogoImg(brand, '92px', '40px'));
                return el;
            }
        );
    </script>
</body>
</html>
