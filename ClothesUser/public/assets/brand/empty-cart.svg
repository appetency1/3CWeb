  <line x1="35" y1="78" x2="35" y2="90" stroke="#D1D5DB" stroke-width="3" stroke-linecap="round"/>
  <line x1="85" y1="78" x2="85" y2="90" stroke="#D1D5DB" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="90" x2="88" y2="90" stroke="#D1D5DB" stroke-width="3" stroke-linecap="round"/>
  <!-- Wheels -->
  <circle cx="42" cy="96" r="5" stroke="#D1D5DB" stroke-width="2.5" fill="none"/>
  <circle cx="78" cy="96" r="5" stroke="#D1D5DB" stroke-width="2.5" fill="none"/>
  <!-- Dashed "empty" lines -->
  <line x1="48" y1="50" x2="72" y2="50" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
  <line x1="50" y1="60" x2="70" y2="60" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
  <line x1="52" y1="70" x2="68" y2="70" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
</svg>