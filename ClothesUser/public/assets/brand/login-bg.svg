<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1080" preserveAspectRatio="xMidYMid slice">
  <!-- 数码/赛博朋克登录背景 -->
  <defs>
    <linearGradient id="loginBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="35%" stop-color="#0a0a20"/>
      <stop offset="70%" stop-color="#0f0a2a"/>
      <stop offset="100%" stop-color="#060612"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="60%" cy="25%" r="55%">
      <stop offset="0%" stop-color="rgba(0,240,255,0.10)"/>
      <stop offset="100%" stop-color="rgba(0,240,255,0)"/>
    </radialGradient>
    <radialGradient id="glowMagenta" cx="30%" cy="70%" r="50%">
      <stop offset="0%" stop-color="rgba(184,41,247,0.08)"/>
      <stop offset="100%" stop-color="rgba(184,41,247,0)"/>
    </radialGradient>
    <radialGradient id="glowPink" cx="80%" cy="80%" r="40%">
      <stop offset="0%" stop-color="rgba(255,42,138,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,42,138,0)"/>
    </radialGradient>
    <!-- Circuit trace pattern -->
    <pattern id="circuit" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <g stroke="rgba(0,240,255,0.025)" stroke-width="0.8" fill="none">
        <path d="M0 60 L40 60 L40 20 L80 20"/>
        <path d="M60 0 L60 40 L100 40 L100 80"/>
        <path d="M120 60 L80 60 L80 100 L40 100"/>
        <path d="M60 120 L60 80 L20 80 L20 40"/>
        <circle cx="40" cy="20" r="2.5" fill="rgba(0,240,255,0.03)"/>
        <circle cx="100" cy="80" r="2.5" fill="rgba(0,240,255,0.03)"/>
        <circle cx="20" cy="40" r="2.5" fill="rgba(0,240,255,0.03)"/>
        <circle cx="80" cy="100" r="2.5" fill="rgba(0,240,255,0.03)"/>
      </g>
    </pattern>
  </defs>
  
  <!-- 基础背景 -->
  <rect width="960" height="1080" fill="url(#loginBg)"/>
  <rect width="960" height="1080" fill="url(#glowCyan)"/>
  <rect width="960" height="1080" fill="url(#glowMagenta)"/>
  <rect width="960" height="1080" fill="url(#glowPink)"/>
  
  <!-- 电路板纹理 -->
  <rect width="960" height="1080" fill="url(#circuit)"/>
  
  <!-- 网格线 -->
  <g stroke="rgba(0,240,255,0.025)" stroke-width="0.5">
    <line x1="0" y1="180" x2="960" y2="180"/>
    <line x1="0" y1="360" x2="960" y2="360"/>
    <line x1="0" y1="540" x2="960" y2="540"/>
    <line x1="0" y1="720" x2="960" y2="720"/>
    <line x1="0" y1="900" x2="960" y2="900"/>
    <line x1="160" y1="0" x2="160" y2="1080"/>
    <line x1="320" y1="0" x2="320" y2="1080"/>
    <line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="640" y1="0" x2="640" y2="1080"/>
    <line x1="800" y1="0" x2="800" y2="1080"/>
  </g>
  
  <!-- 装饰性同心圆（科技感） -->
  <g stroke="rgba(0,240,255,0.04)" stroke-width="0.8" fill="none">
    <circle cx="700" cy="200" r="280"/>
    <circle cx="700" cy="200" r="200"/>
    <circle cx="700" cy="200" r="120"/>
    <circle cx="700" cy="200" r="50"/>
    <line x1="700" y1="-80" x2="700" y2="480" stroke-dasharray="4 6"/>
    <line x1="420" y1="200" x2="980" y2="200" stroke-dasharray="4 6"/>
  </g>
  
  <!-- 装饰性六边形（数码感） -->
  <g stroke="rgba(184,41,247,0.05)" stroke-width="0.8" fill="none" transform="translate(200, 750)">
    <polygon points="30,0 60,17 60,52 30,69 0,52 0,17"/>
    <polygon points="30,-5 65,15 65,55 30,75 -5,55 -5,15" stroke="rgba(255,42,138,0.03)"/>
  </g>
  <g stroke="rgba(0,240,255,0.03)" stroke-width="0.6" fill="none" transform="translate(120, 300) scale(0.7)">
    <polygon points="30,0 60,17 60,52 30,69 0,52 0,17"/>
  </g>
  <g stroke="rgba(184,41,247,0.03)" stroke-width="0.6" fill="none" transform="translate(800, 500) scale(0.5)">
    <polygon points="30,0 60,17 60,52 30,69 0,52 0,17"/>
  </g>
  
  <!-- 底部品牌水印 -->
  <text x="480" y="970" font-family="'Orbitron','PingFang SC',sans-serif" font-size="72" font-weight="800" fill="rgba(0,240,255,0.03)" text-anchor="middle" letter-spacing="12">NEXUS</text>
  <text x="480" y="1000" font-family="'Orbitron','PingFang SC',sans-serif" font-size="11" font-weight="400" fill="rgba(0,240,255,0.04)" text-anchor="middle" letter-spacing="6">DIGITAL · FUTURE · CONNECT</text>
</svg>