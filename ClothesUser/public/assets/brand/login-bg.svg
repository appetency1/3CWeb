<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1080" preserveAspectRatio="xMidYMid slice">
  <!-- Deep dark gradient background for login page left panel -->
  <defs>
    <linearGradient id="loginBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1629"/>
      <stop offset="40%" stop-color="#1A1F3C"/>
      <stop offset="100%" stop-color="#2D3561"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="75%" cy="30%" r="60%">
      <stop offset="0%" stop-color="rgba(79,124,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(79,124,255,0)"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="25%" cy="75%" r="50%">
      <stop offset="0%" stop-color="rgba(167,139,250,0.12)"/>
      <stop offset="100%" stop-color="rgba(167,139,250,0)"/>
    </radialGradient>
  </defs>
  <rect width="960" height="1080" fill="url(#loginBg)"/>
  <rect width="960" height="1080" fill="url(#glowBlue)"/>
  <rect width="960" height="1080" fill="url(#glowPurple)"/>
  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="200" x2="960" y2="200"/>
    <line x1="0" y1="400" x2="960" y2="400"/>
    <line x1="0" y1="600" x2="960" y2="600"/>
    <line x1="0" y1="800" x2="960" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="1080"/>
    <line x1="400" y1="0" x2="400" y2="1080"/>
    <line x1="600" y1="0" x2="600" y2="1080"/>
    <line x1="800" y1="0" x2="800" y2="1080"/>
  </g>
  <!-- Decorative circles -->
  <circle cx="750" cy="150" r="300" stroke="rgba(79,124,255,0.06)" stroke-width="1" fill="none"/>
  <circle cx="750" cy="150" r="200" stroke="rgba(79,124,255,0.05)" stroke-width="1" fill="none"/>
  <circle cx="750" cy="150" r="100" stroke="rgba(79,124,255,0.08)" stroke-width="1" fill="none"/>
  <circle cx="200" cy="850" r="250" stroke="rgba(167,139,250,0.05)" stroke-width="1" fill="none"/>
  <!-- Floating fashion icon -->
  <g opacity="0.08" transform="translate(680, 380)">
    <path d="M0 0 Q60 -40 120 0 Q80 60 120 120 L0 120 Z" fill="white"/>
  </g>
  <!-- Brand name at bottom -->
  <text x="480" y="980" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="64" font-weight="800" fill="rgba(255,255,255,0.04)" text-anchor="middle" letter-spacing="8">FASHION STORE</text>
</svg>