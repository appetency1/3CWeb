<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料 · MAISON</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #faf9f7;
            --bg-secondary: #f5f3f0;
            --bg-card: #ffffff;
            --bg-dark: #1a1a1a;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-muted: #999999;
            --accent: #c45c4a;
            --accent-light: #e8a090;
            --accent-dark: #8b3a2a;
            --accent-bg: #fdf5f3;
            --success: #2d8a5e;
            --border: #e8e5e0;
            --border-hover: #d0cbc4;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 12px 32px rgba(0,0,0,0.08);
            --shadow-lg: 0 24px 56px rgba(0,0,0,0.12);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --ease: cubic-bezier(0.22, 1, 0.36, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== Header ===== */
        .header {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-inner {
            max-width: 1440px;
            margin: 0 auto;
            padding: 14px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: 1px;
        }
        .logo-mark {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: grid;
            place-items: center;
            color: #fff;
            font-size: 18px;
        }
        .nav {
            display: flex;
            gap: 32px;
        }
        .nav a {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            position: relative;
            transition: color 0.25s var(--ease);
        }
        .nav a::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s var(--ease);
        }
        .nav a:hover { color: var(--text-primary); }
        .nav a.active { color: var(--accent); }
        .nav a.active::after { width: 100%; }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-card);
            display: grid;
            place-items: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.25s var(--ease);
        }
        .icon-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }
        .icon-btn svg { width: 18px; height: 18px; stroke-width: 1.8; }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: #fff;
            display: grid;
            place-items: center;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 0 0 1px var(--border);
        }

        /* ===== Page Header ===== */
        .page-header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 40px 0;
        }
        .breadcrumbs {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }
        .breadcrumbs a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }
        .breadcrumbs a:hover { color: var(--accent); }
        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .page-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
        }

        /* ===== Main Layout ===== */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 36px 40px 80px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 32px;
            align-items: start;
        }

        /* ===== Sidebar Card ===== */
        .profile-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px 24px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 100px;
        }
        .avatar-upload {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
        }
        .avatar-upload input { display: none; }
        .avatar-preview {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f8e8e4 0%, #f5d6ce 100%);
            display: grid;
            place-items: center;
            overflow: hidden;
            border: 4px solid #fff;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            transition: all 0.35s var(--ease);
        }
        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-preview svg {
            width: 56px;
            height: 56px;
            color: var(--accent);
            opacity: 0.8;
        }
        .avatar-upload:hover .avatar-preview {
            transform: scale(1.03);
            box-shadow: var(--shadow-lg);
        }
        .avatar-overlay {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(26,26,26,0.55);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #fff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s var(--ease);
        }
        .avatar-upload:hover .avatar-overlay { opacity: 1; }
        .avatar-overlay svg { width: 24px; height: 24px; stroke-width: 2; }
        .avatar-overlay span { font-size: 12px; font-weight: 500; }
        .profile-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .profile-id {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }
        .profile-stat strong {
            display: block;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .profile-stat span {
            font-size: 12px;
            color: var(--text-muted);
        }
        .profile-menu {
            margin-top: 24px;
            text-align: left;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s var(--ease);
            margin-bottom: 4px;
        }
        .menu-item:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        .menu-item.active {
            background: var(--accent-bg);
            color: var(--accent);
        }
        .menu-item svg {
            width: 18px;
            height: 18px;
            stroke-width: 2;
        }

        /* ===== Form Card ===== */
        .form-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-sm);
        }
        .form-section {
            margin-bottom: 36px;
        }
        .form-section:last-of-type { margin-bottom: 0; }
        .section-label {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-label::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--accent);
            border-radius: 2px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group.full { grid-column: 1 / -1; }
        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .form-label span {
            color: var(--text-muted);
            font-weight: 400;
            margin-left: 4px;
        }
        .form-input {
            height: 52px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0 18px;
            font-family: inherit;
            font-size: 15px;
            color: var(--text-primary);
            background: var(--bg-card);
            transition: all 0.25s var(--ease);
            outline: none;
        }
        .form-input::placeholder { color: var(--text-muted); }
        .form-input:hover { border-color: var(--border-hover); }
        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-bg);
        }
        .gender-group {
            display: flex;
            gap: 12px;
        }
        .gender-option {
            flex: 1;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.25s var(--ease);
            user-select: none;
        }
        .gender-option svg {
            width: 18px;
            height: 18px;
            stroke-width: 2;
        }
        .gender-option:hover { border-color: var(--border-hover); }
        .gender-option.active {
            border-color: var(--accent);
            background: var(--accent-bg);
            color: var(--accent);
            font-weight: 600;
        }
        .gender-radio { display: none; }

        .form-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 16px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }
        .btn {
            height: 52px;
            padding: 0 32px;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s var(--ease);
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1.5px solid var(--border);
        }
        .btn-secondary:hover {
            background: var(--bg-card);
            border-color: var(--border-hover);
        }
        .btn-primary {
            background: var(--bg-dark);
            color: #fff;
            box-shadow: 0 8px 20px rgba(26,26,26,0.18);
        }
        .btn-primary:hover {
            background: #000;
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(26,26,26,0.22);
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-dark);
            color: #fff;
            padding: 14px 28px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            opacity: 0;
            transition: all 0.4s var(--ease);
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast svg { width: 18px; height: 18px; stroke-width: 2; }

        /* ===== Animations ===== */
        .profile-card, .form-card {
            opacity: 0;
            transform: translateY(24px);
            animation: slideUp 0.7s var(--ease) forwards;
        }
        .form-card { animation-delay: 0.1s; }
        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== Responsive ===== */
        @media (max-width: 900px) {
            .main { grid-template-columns: 1fr; }
            .profile-card { position: static; }
            .form-grid { grid-template-columns: 1fr; }
            .nav { display: none; }
        }
        @media (max-width: 640px) {
            .header-inner, .page-header, .main {
                padding-left: 16px;
                padding-right: 16px;
            }
            .form-card { padding: 28px 20px; }
            .page-title { font-size: 32px; }
            .form-actions {
                flex-direction: column-reverse;
                align-items: stretch;
            }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="#" class="logo">
                <span class="logo-mark">M</span>
                MAISON
            </a>
            <nav class="nav">
                <a href="#">首页</a>
                <a href="#">女装</a>
                <a href="#">男装</a>

            </nav>
            <div class="header-actions">
                <button class="icon-btn" aria-label="搜索">

                </button>
                <div class="user-avatar">R</div>
            </div>
        </div>
    </header>

    <div class="page-header">
        <div class="breadcrumbs">
            <a href="#">首页</a>
            <span>/</span>
            <a href="#">我的账户</a>
            <span>/</span>
            <span>个人资料</span>
        </div>
        <h1 class="page-title">个人资料</h1>
        <p class="page-subtitle">管理你的账户信息，让购物体验更个性化。</p>
    </div>

    <main class="main">
        <aside class="profile-card">
            <div class="avatar-upload">
                <input type="file" id="avatarInput" accept="image/*">
                <label for="avatarInput" class="avatar-preview" id="avatarPreview">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </label>
                <div class="avatar-overlay">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    <span>更换头像</span>
                </div>
            </div>
            <div class="profile-name">rafa</div>
            <div class="profile-id">会员 ID: 88392011</div>
            <div class="profile-stats">
                <div class="profile-stat"><strong>12</strong><span>订单</span></div>
                <div class="profile-stat"><strong>3</strong><span>收藏</span></div>
                <div class="profile-stat"><strong>2</strong><span>优惠券</span></div>
            </div>
            <div class="profile-menu">
                <div class="menu-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    个人资料
                </div>
                <div class="menu-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    我的订单
                </div>
                <div class="menu-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>

                <div class="menu-item">

                    账户设置

        </aside>

        <section class="form-card">
            <div class="form-section">
                <div class="section-label">基本信息</div>
                <div class="form-grid">

                            <label class="gender-option">
                                <input type="radio" name="gender" class="gender-radio" value="female">

                                女
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">手机号</label>
                        <input type="tel" class="form-input" placeholder="选填" value="">

                    <div class="form-group">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-input" placeholder="选填" value="">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-label">收货信息</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">收货人</label>
                        <input type="text" class="form-input" placeholder="请输入收货人姓名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">联系电话</label>
                        <input type="tel" class="form-input" placeholder="请输入联系电话">
                    </div>
                    <div class="form-group full">
                        <label class="form-label">详细地址</label>
                        <input type="text" class="form-input" placeholder="请输入街道、门牌号等详细地址">
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn btn-secondary" type="button">取消</button>
                <button class="btn btn-primary" type="button" id="saveBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:18px;height:18px;stroke-width:2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    保存修改
                </button>
            </div>
        </section>
    </main>

    <div class="toast" id="toast">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        资料已保存
    </div>

    <script>
        // Gender selection
        document.querySelectorAll('.gender-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.gender-option').forEach(o => o.classList.remove('active'));
                this.classList.add('active');
                this.querySelector('.gender-radio').checked = true;
            });
        });

        // Avatar preview
        const avatarInput = document.getElementById('avatarInput');
        const avatarPreview = document.getElementById('avatarPreview');
        avatarInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                avatarPreview.innerHTML = `<img src="${url}" alt="头像">`;
            }
        });

        // Save toast
        const saveBtn = document.getElementById('saveBtn');
        const toast = document.getElementById('toast');
        saveBtn.addEventListener('click', function() {
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        });
    </script>
</body>
</html>
