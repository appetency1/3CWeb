<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clothes. MagicBento Dashboard Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    :root {
      --bg: #f3f0ec;
      --surface: #ffffff;
      --surface-warm: #faf8f6;
      --text: #1a1816;
      --text-secondary: #706a64;
      --text-muted: #a9a39d;
      --accent: #b05c4f;
      --accent-rgb: 176, 92, 79;
      --gold: #c9a227;
      --gold-rgb: 201, 162, 39;
      --green: #4a7c59;
      --green-rgb: 74, 124, 89;
      --border: #e6e1dc;
      --border-hover: #d3cdc6;
      --shadow-soft: 0 4px 24px rgba(26,24,22,0.04);
      --shadow-medium: 0 12px 48px rgba(26,24,22,0.07);
      --shadow-large: 0 32px 96px rgba(26,24,22,0.1);
      --radius: 24px;
      --radius-sm: 16px;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; min-height: 100%;
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    body {
      padding: 40px;
      overflow-x: hidden;
    }

    /* ===== Ambient ===== */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .ambient__grain {
      position: absolute;
      inset: 0;
      opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      mix-blend-mode: multiply;
    }

    /* ===== Global Spotlight ===== */
    .global-spotlight {
      position: fixed;
      width: 1000px;
      height: 1000px;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(circle,
        rgba(var(--accent-rgb), 0.32) 0%,
        rgba(var(--accent-rgb), 0.18) 14%,
        rgba(var(--accent-rgb), 0.08) 26%,
        transparent 50%
      );
      z-index: 1;
      opacity: 0;
      transform: translate(-50%, -50%);
      mix-blend-mode: normal;
    }

    /* ===== Layout ===== */
    .dashboard {
      position: relative;
      z-index: 2;
      max-width: 1280px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 36px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .header__title {
      font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
      font-size: 42px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .header__subtitle {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .header__date {
      font-size: 13px;
      color: var(--text-muted);
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
    }

    /* ===== Bento Grid ===== */
    .bento-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: minmax(160px, auto);
      gap: 24px;
    }

    .bento-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid rgba(var(--accent-rgb), 0.35);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      transform-style: preserve-3d;
      transition: box-shadow 0.4s var(--ease-out), border-color 0.3s var(--ease-out);
      --glow-x: 50%;
      --glow-y: 50%;
      --glow-intensity: 0;
      --glow-radius: 280px;
    }

    .bento-card:hover {
      border-color: rgba(var(--accent-rgb), 0.55);
      box-shadow: 0 20px 60px rgba(var(--accent-rgb), 0.12);
    }

    .bento-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      padding: 2px;
      background: radial-gradient(
        var(--glow-radius) circle at var(--glow-x) var(--glow-y),
        rgba(var(--accent-rgb), calc(0.7 * var(--glow-intensity))),
        rgba(var(--accent-rgb), calc(0.35 * var(--glow-intensity))) 35%,
        rgba(var(--accent-rgb), calc(0.12 * var(--glow-intensity))) 55%,
        transparent 75%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      z-index: 3;
    }

    .bento-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      background: radial-gradient(
        var(--glow-radius) circle at var(--glow-x) var(--glow-y),
        rgba(var(--accent-rgb), calc(0.1 * var(--glow-intensity))),
        rgba(var(--accent-rgb), calc(0.04 * var(--glow-intensity))) 45%,
        transparent 65%
      );
      pointer-events: none;
      z-index: 1;
      opacity: var(--glow-intensity);
      transition: opacity 0.2s;
    }

    .bento-card--wide {
      grid-column: span 2;
    }

    .bento-card--tall {
      grid-row: span 2;
    }

    .card__content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      transition: opacity 0.35s var(--ease-out), transform 0.35s var(--ease-out);
    }

    .bento-card:hover .card__content {
      opacity: 0.92;
      transform: translateY(-2px);
    }

    .card__label {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .card__value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 34px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 14px;
    }

    .card__trend {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
    }

    .card__trend.up {
      color: var(--green);
      background: rgba(var(--green-rgb), 0.08);
    }

    .card__trend.down {
      color: var(--accent);
      background: rgba(var(--accent-rgb), 0.08);
    }

    .card__trend.neutral {
      color: var(--gold);
      background: rgba(var(--gold-rgb), 0.08);
    }

    /* Chart cards */
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .chart-title {
      font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
      font-size: 22px;
      font-weight: 600;
    }

    .chart-period {
      font-size: 12px;
      color: var(--text-muted);
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: var(--surface-warm);
    }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      height: 160px;
      padding-top: 20px;
    }

    .bar-group {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    .bar {
      width: 100%;
      max-width: 36px;
      background: linear-gradient(180deg, rgba(var(--accent-rgb), 0.22) 0%, rgba(var(--accent-rgb), 0.08) 100%);
      border-radius: 6px 6px 0 0;
      position: relative;
      transition: all 0.4s var(--ease-out);
    }

    .bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--accent);
      border-radius: 6px 6px 0 0;
    }

    .bar-label {
      font-size: 11px;
      color: var(--text-muted);
    }

    .donut-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      flex: 1;
    }

    .donut-chart {
      width: 180px;
      height: 180px;
      position: relative;
      transform: rotate(-90deg);
      filter: drop-shadow(0 8px 24px rgba(var(--accent-rgb), 0.1));
    }

    .donut-chart svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .donut-track {
      fill: none;
      stroke: var(--border);
      stroke-width: 22;
    }

    .donut-segment {
      fill: none;
      stroke-width: 22;
      stroke-linecap: round;
      cursor: pointer;
      transition: filter 0.3s var(--ease-out), transform 0.3s var(--ease-out);
      transform-origin: 80px 80px;
    }

    .donut-segment:hover {
      filter: brightness(1.08) drop-shadow(0 0 8px currentColor);
      transform: scale(1.04);
    }

    .donut-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform: rotate(90deg);
      pointer-events: none;
    }

    .donut-center__label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .donut-center__value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 500;
      color: var(--text);
      margin-top: 2px;
    }

    .legend {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .legend-pct {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
    }

    /* Particles */
    .particle {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(var(--accent-rgb), 1);
      box-shadow: 0 0 10px 2px rgba(var(--accent-rgb), 0.55);
      pointer-events: none;
      z-index: 4;
    }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--accent-rgb), 0.35) 0%, rgba(var(--accent-rgb), 0.15) 40%, transparent 70%);
      pointer-events: none;
      z-index: 5;
      transform: scale(0);
      opacity: 1;
    }

    /* Responsive */
    @media (max-width: 1100px) {
      .bento-grid { grid-template-columns: repeat(2, 1fr); }
      .bento-card--wide { grid-column: span 2; }
    }

    @media (max-width: 680px) {
      body { padding: 24px; }
      .bento-grid { grid-template-columns: 1fr; }
      .bento-card--wide { grid-column: span 1; }
      .header { flex-direction: column; align-items: flex-start; gap: 16px; }
      .donut-wrap { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="ambient">
  <div class="ambient__grain"></div>
</div>
<div class="global-spotlight" id="spotlight"></div>

<div class="dashboard">
  <header class="header">
    <div>
      <h1 class="header__title">数据概览</h1>
      <div class="header__subtitle">2026年6月19日，欢迎回来</div>
    </div>
    <div class="header__date">今日实时</div>
  </header>

  <main class="bento-grid" id="bentoGrid">
    <!-- Stat cards -->
    <div class="bento-card" data-bento>
      <div class="card__content">
        <div class="card__label">今日营收</div>
        <div class="card__value">¥12,580</div>
        <div class="card__trend up">+12.5% 较昨日</div>
      </div>
    </div>

    <div class="bento-card" data-bento>
      <div class="card__content">
        <div class="card__label">订单数量</div>
        <div class="card__value">142</div>
        <div class="card__trend up">+8.2% 较昨日</div>
      </div>
    </div>

    <div class="bento-card" data-bento>
      <div class="card__content">
        <div class="card__label">新增用户</div>
        <div class="card__value">38</div>
        <div class="card__trend down">-2.1% 较昨日</div>
      </div>
    </div>

    <div class="bento-card" data-bento>
      <div class="card__content">
        <div class="card__label">商品总数</div>
        <div class="card__value">64</div>
        <div class="card__trend neutral">+3 件上新</div>
      </div>
    </div>

    <!-- Chart cards -->
    <div class="bento-card bento-card--wide" data-bento>
      <div class="card__content">
        <div class="chart-header">
          <div class="chart-title">销售趋势</div>
          <div class="chart-period">最近 7 天</div>
        </div>
        <div class="bar-chart" id="barChart"></div>
      </div>
    </div>

    <div class="bento-card bento-card--wide" data-bento>
      <div class="card__content">
        <div class="chart-header">
          <div class="chart-title">分类占比</div>
          <div class="chart-period">本周</div>
        </div>
        <div class="donut-wrap">
          <div class="donut-chart">
            <svg viewBox="0 0 160 160">
              <circle class="donut-track" cx="80" cy="80" r="70"></circle>
              <circle class="donut-segment" cx="80" cy="80" r="70" stroke="var(--accent)" data-start="0" data-percent="35"></circle>
              <circle class="donut-segment" cx="80" cy="80" r="70" stroke="var(--gold)" data-start="35" data-percent="25"></circle>
              <circle class="donut-segment" cx="80" cy="80" r="70" stroke="var(--green)" data-start="60" data-percent="20"></circle>
              <circle class="donut-segment" cx="80" cy="80" r="70" stroke="var(--border-hover)" data-start="80" data-percent="20"></circle>
            </svg>
            <div class="donut-center">
              <div class="donut-center__label">Total</div>
              <div class="donut-center__value">100%</div>
            </div>
          </div>
          <div class="legend">
            <div class="legend-item">
              <span class="legend-dot" style="background: var(--accent);"></span>
              <span>上装</span>
              <span class="legend-pct">35%</span>
            </div>
            <div class="legend-item">
              <span class="legend-dot" style="background: var(--gold);"></span>
              <span>裙装</span>
              <span class="legend-pct">25%</span>
            </div>
            <div class="legend-item">
              <span class="legend-dot" style="background: var(--green);"></span>
              <span>裤装</span>
              <span class="legend-pct">20%</span>
            </div>
            <div class="legend-item">
              <span class="legend-dot" style="background: var(--border-hover);"></span>
              <span>配饰</span>
              <span class="legend-pct">20%</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  // ===== Bar chart =====
  const barData = [
    { label: '周一', value: 45 },
    { label: '周二', value: 62 },
    { label: '周三', value: 38 },
    { label: '周四', value: 71 },
    { label: '周五', value: 84 },
    { label: '周六', value: 96 },
    { label: '周日', value: 88 },
  ];

  const barChart = document.getElementById('barChart');
  barData.forEach((item, i) => {
    const group = document.createElement('div');
    group.className = 'bar-group';
    group.innerHTML = `
      <div class="bar" style="height: 0;" data-value="${item.value}"></div>
      <div class="bar-label">${item.label}</div>
    `;
    barChart.appendChild(group);
    setTimeout(() => {
      group.querySelector('.bar').style.height = item.value + '%';
    }, 600 + i * 80);
  });

  // ===== Donut chart reveal =====
  const donutSegments = document.querySelectorAll('.donut-segment');
  const radius = 70;
  const circumference = 2 * Math.PI * radius;

  donutSegments.forEach((seg, i) => {
    const percent = parseFloat(seg.dataset.percent);
    const startPercent = parseFloat(seg.dataset.start);
    const length = (percent / 100) * circumference;
    const gap = circumference - length;
    const rotation = (startPercent / 100) * 360;

    seg.style.strokeDasharray = `${length} ${gap}`;
    seg.style.strokeDashoffset = length;
    seg.style.transform = `rotate(${rotation}deg)`;

    gsap.to(seg, {
      strokeDashoffset: 0,
      duration: 1.1,
      delay: 0.7 + i * 0.18,
      ease: 'power3.out'
    });
  });

  // center text pop
  gsap.from('.donut-center', {
    scale: 0.8,
    opacity: 0,
    duration: 0.6,
    delay: 1.3,
    ease: 'back.out(1.7)'
  });

  // ===== MagicBento Effects =====
  const cards = document.querySelectorAll('[data-bento]');
  const spotlight = document.getElementById('spotlight');
  const grid = document.getElementById('bentoGrid');

  function createParticle(x, y, container) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    container.appendChild(el);
    return el;
  }

  function clearParticles(container) {
    container.querySelectorAll('.particle').forEach(p => {
      gsap.to(p, {
        scale: 0,
        opacity: 0,
        duration: 0.3,
        ease: 'back.in(1.7)',
        onComplete: () => p.remove()
      });
    });
  }

  function spawnParticles(card) {
    const rect = card.getBoundingClientRect();
    const count = 10;
    for (let i = 0; i < count; i++) {
      const x = Math.random() * rect.width;
      const y = Math.random() * rect.height;
      const p = createParticle(x, y, card);
      gsap.fromTo(p,
        { scale: 0, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.35, delay: i * 0.04, ease: 'back.out(1.7)' }
      );
      gsap.to(p, {
        x: (Math.random() - 0.5) * 80,
        y: (Math.random() - 0.5) * 80,
        rotation: Math.random() * 360,
        duration: 2 + Math.random() * 2,
        ease: 'none',
        repeat: -1,
        yoyo: true
      });
      gsap.to(p, {
        opacity: 0.35,
        duration: 1.2,
        ease: 'power2.inOut',
        repeat: -1,
        yoyo: true
      });
    }
  }

  function updateCardGlow(card, mouseX, mouseY, intensity) {
    const rect = card.getBoundingClientRect();
    const x = ((mouseX - rect.left) / rect.width) * 100;
    const y = ((mouseY - rect.top) / rect.height) * 100;
    card.style.setProperty('--glow-x', x + '%');
    card.style.setProperty('--glow-y', y + '%');
    card.style.setProperty('--glow-intensity', intensity.toString());
  }

  // Per-card interaction
  cards.forEach(card => {
    let isHovered = false;

    card.addEventListener('mouseenter', () => {
      isHovered = true;
      spawnParticles(card);
      gsap.to(card, {
        scale: 1.015,
        duration: 0.4,
        ease: 'power2.out'
      });
    });

    card.addEventListener('mouseleave', () => {
      isHovered = false;
      clearParticles(card);
      gsap.to(card, {
        rotateX: 0,
        rotateY: 0,
        x: 0,
        y: 0,
        scale: 1,
        duration: 0.5,
        ease: 'power2.out'
      });
      card.style.setProperty('--glow-intensity', '0');
    });

    card.addEventListener('mousemove', (e) => {
      if (!isHovered) return;
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const cx = rect.width / 2;
      const cy = rect.height / 2;

      // Tilt
      const rotateX = ((y - cy) / cy) * -8;
      const rotateY = ((x - cx) / cx) * 8;

      // Magnetism
      const magnetX = (x - cx) * 0.04;
      const magnetY = (y - cy) * 0.04;

      gsap.to(card, {
        rotateX,
        rotateY,
        x: magnetX,
        y: magnetY,
        duration: 0.1,
        ease: 'power2.out',
        transformPerspective: 1200
      });

      // Border glow
      updateCardGlow(card, e.clientX, e.clientY, 1);
    });

    card.addEventListener('click', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const maxDist = Math.max(
        Math.hypot(x, y),
        Math.hypot(x - rect.width, y),
        Math.hypot(x, y - rect.height),
        Math.hypot(x - rect.width, y - rect.height)
      );
      const ripple = document.createElement('div');
      ripple.className = 'ripple';
      ripple.style.cssText = `
        width: ${maxDist * 2}px;
        height: ${maxDist * 2}px;
        left: ${x - maxDist}px;
        top: ${y - maxDist}px;
      `;
      card.appendChild(ripple);
      gsap.fromTo(ripple,
        { scale: 0, opacity: 1 },
        { scale: 1, opacity: 0, duration: 0.8, ease: 'power2.out', onComplete: () => ripple.remove() }
      );
    });
  });

  // Global spotlight
  document.addEventListener('mousemove', (e) => {
    if (!grid) return;
    const gridRect = grid.getBoundingClientRect();
    const inside = e.clientX >= gridRect.left && e.clientX <= gridRect.right &&
                   e.clientY >= gridRect.top && e.clientY <= gridRect.bottom;

    if (!inside) {
      gsap.to(spotlight, { opacity: 0, duration: 0.4, ease: 'power2.out' });
      cards.forEach(c => c.style.setProperty('--glow-intensity', '0'));
      return;
    }

    gsap.to(spotlight, {
      left: e.clientX,
      top: e.clientY,
      opacity: 0.9,
      duration: 0.1,
      ease: 'power2.out'
    });

    // Proximity glow for all cards
    cards.forEach(card => {
      const rect = card.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const distance = Math.hypot(e.clientX - cx, e.clientY - cy) - Math.max(rect.width, rect.height) / 2;
      const effective = Math.max(0, distance);
      const proximity = 140;
      const fade = 240;
      let intensity = 0;
      if (effective <= proximity) intensity = 1;
      else if (effective <= fade) intensity = (fade - effective) / (fade - proximity);
      updateCardGlow(card, e.clientX, e.clientY, intensity * 0.8);
    });
  });

  document.addEventListener('mouseleave', () => {
    gsap.to(spotlight, { opacity: 0, duration: 0.4, ease: 'power2.out' });
    cards.forEach(c => c.style.setProperty('--glow-intensity', '0'));
  });
</script>

</body>
</html>
